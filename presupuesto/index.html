        let currentSlide = 0;
        let currentUser = null;

        // Elementos UI
        const loadingScreen = document.getElementById('loading-screen');
        const presentationContainer = document.getElementById('presentation-container');
        const controlContainer = document.getElementById('control-container');
        const slideContent = document.getElementById('slide-content');
        const slideCounter = document.getElementById('slide-counter');
        const ctrlCounter = document.getElementById('ctrl-counter');
        const roleBadge = document.getElementById('role-badge');
        const headerBar = document.getElementById('header-bar');
        const teleprompterControls = document.getElementById('teleprompter-controls');

        // Configuración visual según el rol
        function applyUI() {
            loadingScreen.classList.add('hidden');

            if (ROL === 'control') {
                // Modo Teléfono (Solo Botones)
                presentationContainer.classList.add('hidden');
                controlContainer.classList.remove('hidden');
                controlContainer.classList.add('flex'); // Activa flexbox vertical

                if (teleprompterControls) teleprompterControls.classList.add('hidden');
            }
            else if (ROL === 'teleprompter') {
                // Modo Notebook (Notas + Controles)
                presentationContainer.classList.remove('hidden');
                controlContainer.classList.add('hidden');

                // Aplicar estilos oscuros absolutos
                document.body.classList.add('teleprompter-bg');
                slideContent.classList.add('teleprompter-bg', 'border-none', 'shadow-none');
                headerBar.classList.add('hidden'); // Ocultar barra superior

                if (teleprompterControls) teleprompterControls.classList.remove('hidden');
            }
            else {
                // Modo Visor (Defecto - Pantalla Gigante)
                presentationContainer.classList.remove('hidden');
                controlContainer.classList.add('hidden');

                document.body.classList.remove('teleprompter-bg');
                slideContent.classList.remove('teleprompter-bg', 'border-none', 'shadow-none');
                headerBar.classList.remove('hidden');
                if (teleprompterControls) teleprompterControls.classList.add('hidden');

                roleBadge.textContent = "📡 MODO VISOR EN VIVO";
                roleBadge.className = "text-xs font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-800 border border-blue-200 shadow-sm";
            }
        }

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, user => {
                    if (user) {
                        currentUser = user;
                        applyUI();

                        // Todos escuchan la base de datos (Incluso el control para sincronizar el número)
                        onSnapshot(stateDocRef, s => {
                            if (s.exists() && s.data().slideIndex !== undefined) {
                                currentSlide = s.data().slideIndex;
                                render();
                            }
                        });

                        // Si es el control, asegurarnos de inyectar el estado inicial
                        if (ROL === 'control') {
                            updateDB(currentSlide);
                        }
                    }
                });
            } catch (e) {
                console.error("Error Auth Firebase", e);
                loadingScreen.innerHTML = '<h2 class="text-red-600 font-bold">Error de conexión a Firebase</h2>';
            }
        }

        // Acciones exclusivas del rol Control o teclado
        window.nextSlide = () => {
            if (currentSlide < slides.length - 1 && (ROL === 'control' || ROL === 'teleprompter')) {
                currentSlide++;
                updateDB(currentSlide);
            }
        };

        window.prevSlide = () => {
            if (currentSlide > 0 && (ROL === 'control' || ROL === 'teleprompter')) {
                currentSlide--;
                updateDB(currentSlide);
            }
        };

        async function updateDB(i) {
            if (currentUser) {
                await setDoc(stateDocRef, { slideIndex: i, time: Date.now() }, { merge: true });
            }
        }

        function render() {
            const data = slides[currentSlide];

            if (ROL === 'control') {
                // Render Control
                ctrlCounter.textContent = currentSlide + 1;
            }
            else if (ROL === 'teleprompter') {
                // Render Teleprompter (Notas Gigantes de Alto Contraste)
                slideContent.innerHTML = `
                    <div class="mb-10 border-b-2 border-gray-800 pb-4 flex justify-between items-end">
                        <span class="text-3xl text-cyan-400 font-bold uppercase tracking-widest">Diapositiva ${currentSlide + 1}</span>
                    </div>
                    <p class="teleprompter-text">${data.nota}</p>
                `;
            }
            else {
                // Render Visor Normal
                slideContent.classList.remove('slide-enter');
                void slideContent.offsetWidth; // Trigger reflow
                slideContent.classList.add('slide-enter');
                slideContent.innerHTML = data.html;
                slideCounter.textContent = currentSlide + 1;

                // QR Local en la primera Diapositiva
                if (currentSlide === 0) {
                    const qrContainer = document.getElementById("qrcode");
                    if (qrContainer) {
                        qrContainer.innerHTML = "";
                        new QRCode(qrContainer, {
                            text: baseUrl,
                            width: 130,
                            height: 130,
                            colorDark: "#0f172a",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.M
                        });
                    }
                }
            }
        }

        // Control por teclado (Espacio y Flechas) habilitado para Teleprompter por si acaso
        document.addEventListener('keydown', e => {
            if (ROL === 'control' || ROL === 'teleprompter') {
                if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
            }
        });

        init();
    </script>
