<html lang="es">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 22px;
      color: #333;
    }

    a {
      display: block;
      margin: 15px 0;
      padding: 12px;
      text-decoration: none;
      color: white;
      background: #007bff;
      border-radius: 8px;
      transition: 0.3s;
      font-weight: bold;
    }

    a:hover {
      background: #0056b3;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>

  <div class="container">
    <h1>Guía de Presupuesto</h1>

    <a href="https://esecaese.github.io/academia/presupuesto/unidades/gem.html" target="_blank">
