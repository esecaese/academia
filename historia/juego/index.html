<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Historia del Paraguay</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        cardBg: '#1E1E1E',
                        primary: '#4F46E5', // Indigo 600
                        primaryHover: '#4338CA', // Indigo 700
                        success: '#10B981', // Emerald 500
                        error: '#EF4444', // Red 500
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateX(5px);
            background-color: #374151; /* gray-700 */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Contenedor Principal -->
    <div id="app" class="bg-cardBg w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden border border-gray-800">
        <!-- El contenido se inyectará aquí a través de JavaScript -->
    </div>

    <script>
        // --- BASE DE DATOS DE PREGUNTAS ---
        // Basadas estrictamente en la guía proporcionada
        const questions = [
            {
                question: "¿Cuál fue la causa inmediata de la gesta revolucionaria del 14 y 15 de mayo de 1811?",
                options: [
                    "La Invasión de las tropas de Manuel Belgrano.",
                    "La traición del gobernador Velazco al intentar pactar con los portugueses (Misión Abreu).",
                    "El inicio de la Revolución Comunera.",
                    "La abdicación del Rey Fernando VII."
                ],
                correct: 1,
                explanation: "La misión Abreu del 9 de mayo de 1811 evidenció el intento de Velazco de entregar la provincia a Portugal, lo que precipitó el golpe de los próceres."
            },
            {
                question: "El Congreso de 1813 adoptó un 'Reglamento de Gobierno'. ¿Qué naturaleza tenía este documento?",
                options: [
                    "Era la primera Constitución Nacional del Paraguay.",
                    "Era un tratado de paz definitivo con España y Buenos Aires.",
                    "No era una Constitución, sino una legislación organizativa que sirvió como antecedente constitucional.",
                    "Era una ley que nombraba al Dr. Francia como dictador perpetuo."
                ],
                correct: 2,
                explanation: "Aunque ordenaba la creación del nuevo Estado, no tenía el rango de Constitución Nacional, pero sí es considerado nuestro primer antecedente constitucional."
            },
            {
                question: "¿Qué sistema de gobierno se estableció en el Congreso de 1813 y quiénes lo conformaron?",
                options: [
                    "Un Triunvirato conformado por Francia, Velazco y Zevallos.",
                    "Una Presidencia a cargo de Carlos Antonio López.",
                    "Una Dictadura Temporal a cargo del Dr. Francia.",
                    "Un Consulado compuesto por Fulgencio Yegros y el Dr. Francia."
                ],
                correct: 3,
                explanation: "Se estableció el Consulado con dos cónsules. Durante este periodo, Francia gobernaba efectivamente mientras Yegros se dedicaba a actividades sociales y militares."
            },
            {
                question: "Para los próceres liberales, la propuesta de la Dictadura en 1814 no se veía como una tiranía. ¿En qué se inspiraban?",
                options: [
                    "En la República Romana, donde era una institución temporal para salvar al Estado de un peligro.",
                    "En el Absolutismo Ilustrado de los Reyes Borbones.",
                    "En el Imperio Británico y su control colonial.",
                    "En la Revolución Francesa y el reinado del terror."
                ],
                correct: 0,
                explanation: "Admiraban a figuras como el romano Cincinnato. La dictadura romana se otorgaba por un periodo de tiempo corto para afrontar crisis graves, no a perpetuidad."
            },
            {
                question: "¿Qué evento provocó el inicio de la 'paranoia total' y el aislamiento extremo del Dr. Francia?",
                options: [
                    "El rechazo de la Misión de Correia da Câmara.",
                    "La conspiración de la Semana Santa de 1820.",
                    "La invasión de Aimé Bonpland.",
                    "La llegada de José Gervasio Artigas a Paraguay."
                ],
                correct: 1,
                explanation: "En 1820 los próceres intentaron derrocarlo. Tras descubrirse por una confesión, Francia fusiló a Yegros y otros se suicidaron (como Pedro Juan Caballero), agudizando su tiranía."
            },
            {
                question: "¿Qué caudillo de la 'Liga de los Pueblos Libres' solicitó y recibió asilo político del Dr. Francia en 1820?",
                options: [
                    "Francisco Ramírez.",
                    "José Gervasio Artigas.",
                    "Manuel Belgrano.",
                    "Tupac Amaru II."
                ],
                correct: 1,
                explanation: "Artigas, traicionado por Ramírez, fue confinado por Francia en Curuguaty. Constituye el primer asilo político oficial en América del Sur."
            },
            {
                question: "El Dr. Francia cerró el Real Colegio Seminario de San Carlos suprimiendo la educación superior. ¿Qué frase usó para justificarlo?",
                options: [
                    "'El Estado es el único maestro'.",
                    "'La educación es enemiga de la patria'.",
                    "'Mientras Marte vela, Minerva duerme'.",
                    "'La voluntad del común es superior a la del rey'."
                ],
                correct: 2,
                explanation: "Marte es el dios de la guerra y Minerva la diosa de la sabiduría. Argumentaba que en tiempos de peligro bélico (guerra), la educación pasaba a un segundo plano."
            },
            {
                question: "El Paraguay declaró ser una República en 1813, pero no hubo un acta formal jurada de independencia en ese momento. ¿Cuándo se solucionó este vacío legal?",
                options: [
                    "En el Congreso de 1814, al nombrar al dictador.",
                    "Con la Constitución de 1870.",
                    "En el Congreso de Tucumán en 1816.",
                    "29 años después, con el Acta de Juramento del 25 de noviembre de 1842."
                ],
                correct: 3,
                explanation: "Ante la amenaza de anexión de los vecinos tras la muerte de Francia, el Congreso de 1842 redactó y juró formalmente la independencia del Paraguay."
            },
            {
                question: "¿Qué movimiento del Periodo Colonial (1717-1735) defendió la premisa de que 'la voluntad del común es superior a la del rey'?",
                options: [
                    "La Rebelión de Tupac Amaru II.",
                    "La Revolución Comunera.",
                    "Las Invasiones Inglesas.",
                    "La Gesta de Mayo."
                ],
                correct: 1,
                explanation: "Liderada por José de Antequera y Castro, la Revolución Comunera es considerada el inicio del sentimiento de identidad o 'patria' en Paraguay."
            },
            {
                question: "¿Qué científico extranjero ingresó a la selva misionera y fue confinado por el Dr. Francia por casi 10 años, instalando luego un hospital y fábrica de licores?",
                options: [
                    "Alexander von Humboldt.",
                    "Antônio Manuel Correia da Câmara.",
                    "Aimé Bonpland.",
                    "Policarpo Patiño."
                ],
                correct: 2,
                explanation: "Bonpland fue apresado por ingresar a territorio disputado. Pese a las protestas mundiales, Francia nunca respondió, y Bonpland terminó viviendo feliz en Paraguay."
            }
        ];

        // --- ESTADO DEL JUEGO ---
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        const appDiv = document.getElementById('app');

        // --- RENDERIZADO DE PANTALLAS ---

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="p-8 text-center fade-in">
                    <div class="mb-6 flex justify-center text-primary">
                        <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold mb-4 text-white">Historia del Paraguay</h1>
                    <p class="text-gray-400 mb-8 text-lg">Demuestra tus conocimientos desde la etapa colonial hasta la Dictadura del Dr. Francia.</p>
                    <button onclick="startGame()" class="bg-primary hover:bg-primaryHover text-white font-bold py-3 px-8 rounded-full text-lg transition duration-300 transform hover:scale-105 shadow-lg shadow-primary/30">
                        Comenzar Reto
                    </button>
                </div>
            `;
        }

        function renderQuestionScreen() {
            const q = questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / questions.length) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                optionsHtml += `
                    <button id="btn-opt-${index}" onclick="selectAnswer(${index})" class="option-btn w-full text-left p-4 rounded-xl bg-gray-800 border border-gray-700 text-gray-200 hover:border-gray-500 mb-3 focus:outline-none">
                        <span class="font-bold mr-2 text-gray-400">${String.fromCharCode(65 + index)}.</span> ${opt}
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <div class="fade-in">
                    <!-- Barra de progreso -->
                    <div class="w-full bg-gray-800 h-2">
                        <div class="bg-primary h-2 transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    
                    <div class="p-6 md:p-8">
                        <div class="flex justify-between items-center mb-6 text-sm font-semibold text-gray-400 border-b border-gray-700 pb-2">
                            <span>Pregunta ${currentQuestionIndex + 1} de ${questions.length}</span>
                            <span>Puntos: ${score}</span>
                        </div>
                        
                        <h2 class="text-xl md:text-2xl font-semibold mb-6 text-white leading-snug">
                            ${q.question}
                        </h2>
                        
                        <div id="options-container" class="mb-6">
                            ${optionsHtml}
                        </div>

                        <div id="feedback-container" class="hidden rounded-xl p-5 mb-6 text-sm md:text-base border-l-4">
                            <!-- Feedback de respuesta irá aquí -->
                        </div>

                        <div class="flex justify-end hidden" id="next-btn-container">
                            <button onclick="nextQuestion()" class="bg-white text-black hover:bg-gray-200 font-bold py-2 px-6 rounded-lg transition duration-200">
                                ${currentQuestionIndex === questions.length - 1 ? 'Ver Resultados' : 'Siguiente Pregunta →'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEndScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let colorClass = "text-primary";

            if (percentage === 100) {
                message = "¡Excelente! Eres un verdadero historiador paraguayo.";
                colorClass = "text-success";
            } else if (percentage >= 70) {
                message = "¡Muy buen trabajo! Tienes un dominio sólido del tema.";
                colorClass = "text-primary";
            } else {
                message = "Buen intento. Te recomiendo repasar un poco más la guía.";
                colorClass = "text-yellow-500";
            }

            appDiv.innerHTML = `
                <div class="p-8 text-center fade-in">
                    <div class="mb-4">
                        <span class="text-6xl font-bold ${colorClass}">${score}</span>
                        <span class="text-2xl text-gray-400">/ ${questions.length}</span>
                    </div>
                    <h2 class="text-2xl font-bold mb-2 text-white">Resultados Finales</h2>
                    <p class="text-gray-400 mb-8">${message}</p>
                    
                    <button onclick="resetGame()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded-full transition duration-300">
                        Jugar de Nuevo
                    </button>
                </div>
            `;
        }

        // --- LÓGICA DEL JUEGO ---

        function startGame() {
            currentQuestionIndex = 0;
            score = 0;
            answered = false;
            renderQuestionScreen();
        }

        function selectAnswer(selectedIndex) {
            if (answered) return; // Evita multiples clics
            answered = true;

            const q = questions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.correct;
            
            if (isCorrect) {
                score++;
            }

            // Deshabilitar botones y aplicar colores
            for (let i = 0; i < q.options.length; i++) {
                const btn = document.getElementById(`btn-opt-${i}`);
                btn.disabled = true;
                btn.classList.remove('hover:border-gray-500', 'bg-gray-800');
                
                if (i === q.correct) {
                    // Respuesta correcta (verde)
                    btn.classList.add('bg-success', 'bg-opacity-20', 'border-success', 'text-success');
                } else if (i === selectedIndex && !isCorrect) {
                    // Respuesta incorrecta seleccionada (roja)
                    btn.classList.add('bg-error', 'bg-opacity-20', 'border-error', 'text-error');
                } else {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            }

            // Mostrar retroalimentación
            const feedbackBox = document.getElementById('feedback-container');
            feedbackBox.classList.remove('hidden');
            
            if (isCorrect) {
                feedbackBox.classList.add('bg-success', 'bg-opacity-10', 'border-success', 'text-green-300');
                feedbackBox.innerHTML = `<strong>¡Correcto!</strong> <br><span class="text-gray-300 mt-1 block">${q.explanation}</span>`;
            } else {
                feedbackBox.classList.add('bg-error', 'bg-opacity-10', 'border-error', 'text-red-300');
                feedbackBox.innerHTML = `<strong>Incorrecto.</strong> <br><span class="text-gray-300 mt-1 block">${q.explanation}</span>`;
            }

            // Mostrar botón siguiente
            document.getElementById('next-btn-container').classList.remove('hidden');
        }

        function nextQuestion() {
            answered = false;
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                renderQuestionScreen();
            } else {
                renderEndScreen();
            }
        }

        function resetGame() {
            startGame();
        }

        // Inicializar
        renderStartScreen();

    </script>
</body>
</html>
