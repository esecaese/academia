<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Consular</title>
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --bg: #f4f1ea;
            --bg2: #efeae0;
            --surface: #fffdf8;
            --surface-2: #faf7f0;
            --text: #26303b;
            --text-soft: #3d4853;
            --muted: #6b7681;
            --border: #e6e0d3;
            --border-strong: #d4ccba;
            --accent: #2f6f8f;
            --accent-ink: #234e63;
            --accent-2: #a8772a;
            --link: #2f6f8f;
            --shadow: 0 2px 8px rgba(40,40,40,.08), 0 8px 28px rgba(40,40,40,.07);
            --shadow-sm: 0 1px 2px rgba(40,40,40,.10);
            --def-bg: #e9f5ee;
            --def-bd: #2e8b6f;
            --def-tx: #1c5a48;
            --imp-bg: #fdf3e3;
            --imp-bd: #cf9412;
            --imp-tx: #785608;
            --ej-bg: #eaf2fb;
            --ej-bd: #3a6ea5;
            --ej-tx: #234e74;
            --rec-bg: #f0ecfb;
            --rec-bd: #6d54c0;
            --rec-tx: #43358a;
            --err-bg: #fdecec;
            --err-bd: #c0473a;
            --err-tx: #8a2e25;
            --note-bg: #ecf6f3;
            --note-bd: #2f8f7f;
            --note-tx: #1d5a4f;
            --mark: #ffe08a;
            --mark-active: #ff9d4d;
        }
        html.dark {
            --bg: #0f1216;
            --bg2: #141821;
            --surface: #181c23;
            --surface-2: #1e232c;
            --text: #e5e8ec;
            --text-soft: #cdd2d8;
            --muted: #98a2af;
            --border: #2a313b;
            --border-strong: #3a434f;
            --accent: #6fb3d6;
            --accent-ink: #a6cfe6;
            --accent-2: #d8ad62;
            --link: #7fc0e2;
            --shadow: 0 2px 8px rgba(0,0,0,.45), 0 8px 28px rgba(0,0,0,.4);
            --shadow-sm: 0 1px 2px rgba(0,0,0,.5);
            --def-bg: #14241d;
            --def-bd: #3da583;
            --def-tx: #a8e1cc;
            --imp-bg: #2a2110;
            --imp-bd: #d6a93a;
            --imp-tx: #f0d49a;
            --ej-bg: #12202e;
            --ej-bd: #5b95c8;
            --ej-tx: #abceed;
            --rec-bg: #1e1830;
            --rec-bd: #9683d6;
            --rec-tx: #cbc0fb;
            --err-bg: #2c1614;
            --err-bd: #d4675a;
            --err-tx: #f4b5ac;
            --note-bg: #12241f;
            --note-bd: #3da58f;
            --note-tx: #a7ddd0;
            --mark: #8a6a16;
            --mark-active: #c2641a;
        }

        /* ===== RESET ===== */
        * { box-sizing: border-box; margin: 0; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            background: linear-gradient(180deg, var(--bg), var(--bg2));
            color: var(--text);
            font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            padding: 0 0 3rem;
        }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .ui { font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif; }

        /* ===== TOOLBAR ===== */
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: .6rem;
            flex-wrap: wrap;
            padding: .6rem 1rem;
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .toolbar .brand {
            display: flex;
            align-items: center;
            gap: .55rem;
            font-weight: 700;
            color: var(--accent-ink);
            font-size: 1rem;
        }
        .toolbar .brand .logo {
            display: inline-grid;
            place-items: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            font-size: 1rem;
            box-shadow: var(--shadow-sm);
        }
        .toolbar .spacer { flex: 1; }
        .tb-btn {
            cursor: pointer;
            border: 1px solid var(--border-strong);
            background: var(--surface-2);
            color: var(--text-soft);
            border-radius: 8px;
            padding: .5rem .8rem;
            font-size: .85rem;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            transition: .2s;
            white-space: nowrap;
        }
        .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tb-btn:active { transform: scale(.96); }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            max-width: 880px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* ===== PORTADA ===== */
        .hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2.4rem 1.8rem;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 2rem;
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(900px 200px at 50% -40%, color-mix(in srgb, var(--accent) 16%, transparent), transparent);
            pointer-events: none;
        }
        .hero .kicker {
            position: relative;
            font-family: "Segoe UI", system-ui, sans-serif;
            letter-spacing: .22em;
            text-transform: uppercase;
            font-size: .72rem;
            color: var(--accent);
            font-weight: 700;
        }
        .hero h1 {
            position: relative;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin: .8rem 0 .3rem;
            color: var(--text);
            line-height: 1.15;
        }
        .hero p {
            position: relative;
            color: var(--muted);
            max-width: 60ch;
            margin: .3rem auto 0;
            font-size: 1rem;
        }
        .hero .meta {
            position: relative;
            display: flex;
            gap: .8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.8rem;
        }
        .hero .meta .tb-btn {
            font-weight: 700;
            padding: .7rem 1.4rem;
            font-size: .95rem;
            border-width: 2px;
        }
        .btn-accent { border-color: var(--accent) !important; color: var(--accent) !important; }
        .btn-hard { border-color: var(--accent-2) !important; color: var(--accent-2) !important; }

        /* ===== SECCIÓN EXAMEN ===== */
        .exam-section {
            margin-top: 2rem;
            display: none;
        }
        .exam-section.active { display: block; }

        .exam-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            border-radius: 14px 14px 0 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            box-shadow: var(--shadow-sm);
        }
        .exam-header .icon {
            font-size: 1.8rem;
            line-height: 1;
        }
        .exam-header h2 {
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: clamp(1.2rem, 2.8vw, 1.6rem);
            margin: 0;
            flex: 1;
        }
        .exam-body {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 0;
            border-radius: 0 0 14px 14px;
            padding: 1.6rem 1.2rem 1.8rem;
            box-shadow: var(--shadow);
        }
        .exam-body .lead {
            font-size: 1.04rem;
            color: var(--text-soft);
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            margin: 0 0 1.2rem;
            font-style: italic;
        }
        .exam-controls {
            display: flex;
            flex-wrap: wrap;
            gap: .8rem;
            align-items: center;
            margin-bottom: 1.8rem;
        }
        .exam-controls label {
            color: var(--muted);
            font-size: .9rem;
            font-weight: 600;
        }
        .exam-controls select {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: .5rem .8rem;
            font-size: .9rem;
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .exam-controls .tb-btn {
            font-weight: 600;
            padding: .5rem 1.2rem;
        }

        /* ===== PREGUNTAS ===== */
        .question-card {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-left: 5px solid var(--note-bd);
            border-radius: 10px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: var(--shadow-sm);
            transition: .2s;
        }
        .question-card .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: .4rem;
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .question-card .q-text {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: .8rem;
            color: var(--text);
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: .6rem;
        }
        .option-btn {
            text-align: left;
            padding: .7rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text-soft);
            cursor: pointer;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: .92rem;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: .6rem;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 8%, var(--surface));
        }
        .option-btn:disabled { opacity: .7; cursor: default; }
        .option-btn.selected {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 15%, var(--surface-2));
            color: var(--text);
        }
        .option-btn.correct {
            border-color: var(--def-bd) !important;
            background: var(--def-bg) !important;
            color: var(--def-tx);
        }
        .option-btn.wrong {
            border-color: var(--err-bd) !important;
            background: var(--err-bg) !important;
            color: var(--err-tx);
        }

        /* ===== RESULTADO ===== */
        .result-card {
            display: none;
            margin-top: 2rem;
            background: var(--imp-bg);
            border: 1px solid var(--imp-bd);
            border-radius: 12px;
            padding: 1.6rem 1.2rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .result-card.show { display: block; }
        .result-card .score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--imp-tx);
            margin: 0;
        }
        .result-card .sub {
            font-size: 1.1rem;
            color: var(--imp-tx);
            margin: .2rem 0 0;
            font-weight: 600;
        }
        .result-card .msg {
            margin-top: .6rem;
            font-size: 1rem;
            color: var(--text-soft);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { font-size: 16px; padding: 0 0 2rem; }
            .container { padding: 0 .8rem; }
            .hero { padding: 1.6rem 1rem; }
            .hero h1 { font-size: 1.8rem; }
            .hero .meta .tb-btn { width: 100%; justify-content: center; }
            .exam-body { padding: 1rem .8rem; }
            .question-card { padding: .8rem 1rem; }
            .option-btn { font-size: .88rem; padding: .6rem .8rem; }
            .exam-controls { flex-direction: column; align-items: stretch; }
            .exam-controls select { width: 100%; }
            .toolbar .brand .txt { display: none; }
            .toolbar { padding: .4rem .6rem; }
            .tb-btn { font-size: .8rem; padding: .4rem .6rem; }
            .exam-header { padding: 1rem 1rem; }
            .result-card .score { font-size: 2.4rem; }
        }

        /* ===== UTILS ===== */
        .hidden { display: none !important; }
        .mt-2 { margin-top: 1.5rem; }
        .gap-1 { gap: .5rem; }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== PRINT ===== */
        @media print {
            .toolbar, .exam-controls, .back-home { display: none !important; }
            .exam-section { display: block !important; }
            .hero { break-after: page; }
            .question-card { break-inside: avoid; }
            .option-btn:disabled { opacity: 1; }
            .option-btn.correct { background: #d4edda !important; }
            .option-btn.wrong { background: #f8d7da !important; }
        }
    </style>
</head>
<body>

    <!-- ===== TOOLBAR ===== -->
    <header class="toolbar ui">
        <span class="brand">
            <span class="logo">🎯</span>
            <span class="txt">Examen Consular</span>
        </span>
        <span class="spacer"></span>
        <button id="homeBtn" class="tb-btn" title="Volver al inicio">🏠 Volver</button>
        <button id="themeBtn" class="tb-btn" aria-label="Cambiar tema">🌙 Tema</button>
    </header>

    <!-- ===== CONTENEDOR ===== -->
    <div class="container">

        <!-- ===== PORTADA ===== -->
        <section class="hero" id="homeSection">
            <div class="kicker">Modo Examen</div>
            <h1>Elegí cómo querés evaluarte hoy.</h1>
            <p>Tenés 2 opciones: generar un examen con todo el temario mezclado, o un examen ultra difícil filtrado solo por normativas.</p>
            <div class="meta">
                <button class="tb-btn btn-accent" id="openGame">🎯 Examen Completo</button>
                <button class="tb-btn btn-hard" id="openHardGame">⚖️ Examen Normativo</button>
            </div>
        </section>

        <!-- ===== SECCIÓN EXAMEN ===== -->
        <section class="exam-section" id="gameSection">
            <div class="exam-header">
                <span class="icon" id="gameIcon">🎯</span>
                <h2 id="gameTitle">Examen General</h2>
            </div>
            <div class="exam-body">
                <p class="lead" id="gameDesc">Elegí cuántas preguntas querés ver.</p>

                <div class="exam-controls">
                    <label for="questionCount">Preguntas:</label>
                    <select id="questionCount">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                        <option value="all">Todas</option>
                    </select>
                    <button class="tb-btn btn-accent" id="startGameBtn">🔄 Generar</button>
                    <button class="tb-btn" id="submitGameBtn">✅ Corregir</button>
                </div>

                <div id="gameContent" class="fade-in"></div>

                <div class="result-card" id="resultCard">
                    <p class="score" id="scoreText">0/0</p>
                    <p class="sub" id="scoreSub">Resultado</p>
                    <p class="msg" id="scoreMsg"></p>
                </div>

                <button class="tb-btn back-home mt-2" id="backHomeBtn">🏠 Volver al inicio</button>
            </div>
        </section>

    </div>

        // ===== UTILIDADES =====
        const normRegex = /(ley|decreto|resolución|resolucion|artículo|art\.|convención|protocolo|documento n|rubro 846)/i;

        function shuffle(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ===== ESTADO =====
        let currentTheme = "dark";
        let currentMode = "normal"; // "normal" | "hard"
        let currentQuestions = [];   // array de objetos con {id, section, q, a, options}

        // ===== DOM REFS =====
        const homeSection = document.getElementById("homeSection");
        const gameSection = document.getElementById("gameSection");
        const gameIcon = document.getElementById("gameIcon");
        const gameTitle = document.getElementById("gameTitle");
        const gameDesc = document.getElementById("gameDesc");
        const gameContent = document.getElementById("gameContent");
        const resultCard = document.getElementById("resultCard");
        const scoreText = document.getElementById("scoreText");
        const scoreSub = document.getElementById("scoreSub");
        const scoreMsg = document.getElementById("scoreMsg");
        const questionCount = document.getElementById("questionCount");
        const startGameBtn = document.getElementById("startGameBtn");
        const submitGameBtn = document.getElementById("submitGameBtn");
        const openGameBtn = document.getElementById("openGame");
        const openHardBtn = document.getElementById("openHardGame");
        const homeBtn = document.getElementById("homeBtn");
        const backHomeBtn = document.getElementById("backHomeBtn");
        const themeBtn = document.getElementById("themeBtn");

        // ===== FUNCIONES =====
        function toggleTheme() {
            if (currentTheme === "dark") {
                document.documentElement.classList.remove("dark");
                currentTheme = "light";
                themeBtn.textContent = "☀️ Tema";
            } else {
                document.documentElement.classList.add("dark");
                currentTheme = "dark";
                themeBtn.textContent = "🌙 Tema";
            }
        }

        function goHome() {
            gameSection.classList.remove("active");
            homeSection.style.display = "block";
            resultCard.classList.remove("show");
            gameContent.innerHTML = "";
            currentQuestions = [];
        }

        function showExam() {
            homeSection.style.display = "none";
            gameSection.classList.add("active");
            // scroll al inicio del examen
            gameSection.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function buildQuestion(item, idx) {
            const opts = shuffle([item.a, ...item.distractors]).slice(0, 4);
            return {
                id: `${item.section}-${idx}-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
                section: item.section,
                q: item.q,
                a: item.a,
                options: opts
            };
        }

        function renderGame() {
            // Determinar banco según modo
            let pool = bank;
            if (currentMode === "hard") {
                pool = bank.filter(item => normRegex.test(item.q) || normRegex.test(item.a));
                gameIcon.textContent = "⚖️";
                gameTitle.textContent = "Examen Normativo (Difícil)";
                gameDesc.textContent = "Solo preguntas sobre leyes, decretos, resoluciones y protocolos.";
            } else {
                gameIcon.textContent = "🎯";
                gameTitle.textContent = "Examen General";
                gameDesc.textContent = "Todas las áreas, preguntas mezcladas al azar.";
            }

            if (pool.length === 0) {
                gameContent.innerHTML = `<p style="color:var(--err-tx);">No hay preguntas que coincidan con este filtro.</p>`;
                return;
            }

            let count = questionCount.value === "all" ? pool.length : Number(questionCount.value);
            count = Math.min(count, pool.length);

            const selected = shuffle(pool).slice(0, count);
            currentQuestions = selected.map(buildQuestion);

            // Renderizar
            let html = "";
            currentQuestions.forEach((item, index) => {
                const optsHtml = item.options.map(opt => `
                    <button class="option-btn" data-value="${escapeHtml(opt)}" type="button">
                        ${escapeHtml(opt)}
                    </button>
                `).join("");

                html += `
                    <div class="question-card" data-question-id="${escapeHtml(item.id)}" data-answer="${escapeHtml(item.a)}">
                        <div class="q-header">
                            <span>📝 Pregunta ${index + 1} de ${count}</span>
                            <span style="font-size:.8rem;opacity:.8;">${escapeHtml(item.section)}</span>
                        </div>
                        <div class="q-text">${escapeHtml(item.q)}</div>
                        <div class="options">${optsHtml}</div>
                    </div>
                `;
            });

            gameContent.innerHTML = html;
            resultCard.classList.remove("show");

            // Eventos de selección
            gameContent.querySelectorAll(".option-btn").forEach(btn => {
                btn.addEventListener("click", function() {
                    const card = this.closest(".question-card");
                    // Desmarcar otras opciones de la misma pregunta
                    card.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
                    this.classList.add("selected");
                    card.dataset.selected = this.dataset.value;
                });
            });

            // scroll suave al contenido
            gameContent.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        function submitGame() {
            if (currentQuestions.length === 0) {
                alert("Primero generá un examen.");
                return;
            }

            let correct = 0;
            const cards = gameContent.querySelectorAll(".question-card");

            cards.forEach(card => {
                const answer = card.dataset.answer;
                const selected = card.dataset.selected || "";

                const opts = card.querySelectorAll(".option-btn");
                opts.forEach(btn => {
                    btn.disabled = true;
                    const val = btn.dataset.value;
                    btn.classList.remove("correct", "wrong");
                    if (val === answer) btn.classList.add("correct");
                    if (selected && val === selected && selected !== answer) btn.classList.add("wrong");
                });

                if (selected === answer) correct++;
            });

            const total = cards.length;
            const pct = Math.round((correct / total) * 100);
            let msg = "Rendimiento bajo. Volvé a repasar esa normativa.";
            if (pct >= 50) msg = "Buen avance. Estás logrando identificar las trampas.";
            if (pct >= 75) msg = "Muy buen nivel. Estás reteniendo los detalles finos.";
            if (pct === 100) msg = "Perfecto. Conocimiento dominado al máximo.";

            scoreText.textContent = `${correct}/${total}`;
            scoreSub.textContent = `${pct}% de aciertos`;
            scoreMsg.textContent = msg;
            resultCard.classList.add("show");
            resultCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // ===== EVENTOS =====
        themeBtn.addEventListener("click", toggleTheme);

        openGameBtn.addEventListener("click", () => {
            currentMode = "normal";
            showExam();
            renderGame();
        });

        openHardBtn.addEventListener("click", () => {
            currentMode = "hard";
            showExam();
            renderGame();
        });

        homeBtn.addEventListener("click", goHome);
        backHomeBtn.addEventListener("click", goHome);

        startGameBtn.addEventListener("click", renderGame);
        submitGameBtn.addEventListener("click", submitGame);

        // Inicializar tema según clase inicial (dark)
        if (document.documentElement.classList.contains("dark")) {
            currentTheme = "dark";
            themeBtn.textContent = "🌙 Tema";
        } else {
            currentTheme = "light";
            themeBtn.textContent = "☀️ Tema";
        }

        // Si la URL tiene ?mode=hard, abrir directamente el modo difícil
        const params = new URLSearchParams(window.location.search);
        if (params.get("mode") === "hard") {
            currentMode = "hard";
            showExam();
            renderGame();
        } else if (params.get("mode") === "normal") {
            currentMode = "normal";
            showExam();
            renderGame();
        }
    </script>
</body>
</html>
