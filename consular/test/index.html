<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Consular</title>
    <style>
        /* ===================== VARIABLES / TEMA ===================== */
        :root {
            --reading-size: 18px;
            --bg: #f4f1ea;
            --bg2: #efeae0;
            --surface: #fffdf8;
            --surface-2: #faf7f0;
            --text: #26303b;
            --text-soft: #3d4853;
            --muted: #6b7681;
            --border: #e6e0d3;
            --border-strong: #d4ccba;
            --accent: #2f6f8f;
            --accent-ink: #234e63;
            --accent-2: #a8772a;
            --link: #2f6f8f;
            --shadow: 0 1px 3px rgba(40, 40, 40, .08), 0 8px 28px rgba(40, 40, 40, .07);
            --shadow-sm: 0 1px 2px rgba(40, 40, 40, .10);
            --def-bg: #e9f5ee;
            --def-bd: #2e8b6f;
            --def-tx: #1c5a48;
            --imp-bg: #fdf3e3;
            --imp-bd: #cf9412;
            --imp-tx: #785608;
            --ej-bg: #eaf2fb;
            --ej-bd: #3a6ea5;
            --ej-tx: #234e74;
            --rec-bg: #f0ecfb;
            --rec-bd: #6d54c0;
            --rec-tx: #43358a;
            --err-bg: #fdecec;
            --err-bd: #c0473a;
            --err-tx: #8a2e25;
            --note-bg: #ecf6f3;
            --note-bd: #2f8f7f;
            --note-tx: #1d5a4f;
            --mark: #ffe08a;
            --mark-active: #ff9d4d;
        }

        html.dark {
            --bg: #0f1216;
            --bg2: #141821;
            --surface: #181c23;
            --surface-2: #1e232c;
            --text: #e5e8ec;
            --text-soft: #cdd2d8;
            --muted: #98a2af;
            --border: #2a313b;
            --border-strong: #3a434f;
            --accent: #6fb3d6;
            --accent-ink: #a6cfe6;
            --accent-2: #d8ad62;
            --link: #7fc0e2;
            --shadow: 0 1px 3px rgba(0, 0, 0, .45), 0 10px 34px rgba(0, 0, 0, .4);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, .5);
            --def-bg: #14241d;
            --def-bd: #3da583;
            --def-tx: #a8e1cc;
            --imp-bg: #2a2110;
            --imp-bd: #d6a93a;
            --imp-tx: #f0d49a;
            --ej-bg: #12202e;
            --ej-bd: #5b95c8;
            --ej-tx: #abceed;
            --rec-bg: #1e1830;
            --rec-bd: #9683d6;
            --rec-tx: #cbc0fb;
            --err-bg: #2c1614;
            --err-bd: #d4675a;
            --err-tx: #f4b5ac;
            --note-bg: #12241f;
            --note-bd: #3da58f;
            --note-tx: #a7ddd0;
            --mark: #8a6a16;
            --mark-active: #c2641a;
        }

        /* ===================== BASE ===================== */
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, var(--bg), var(--bg2));
            color: var(--text);
            font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
            font-size: var(--reading-size);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: var(--link);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .ui {
            font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
        }

        /* ===================== PROGRESO ===================== */
        #progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0;
            z-index: 60;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width .1s linear;
        }

        /* ===================== TOOLBAR ===================== */
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: .6rem;
            flex-wrap: wrap;
            padding: .55rem .9rem;
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .toolbar .brand {
            display: flex;
            align-items: center;
            gap: .55rem;
            font-weight: 700;
            color: var(--accent-ink);
            font-size: .98rem;
        }

        .toolbar .brand .logo {
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            font-size: 1rem;
            box-shadow: var(--shadow-sm);
        }

        .toolbar .spacer {
            flex: 1 1 auto;
        }

        .tb-btn {
            cursor: pointer;
            border: 1px solid var(--border-strong);
            background: var(--surface-2);
            color: var(--text-soft);
            border-radius: 8px;
            padding: .4rem .6rem;
            font-size: .85rem;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: .35rem;
        }

        .tb-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: .3rem;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: 9px;
            padding: .18rem .35rem;
        }

        .search-wrap input {
            border: 0;
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: .88rem;
            padding: .28rem .3rem;
            width: min(38vw, 210px);
            outline: none;
        }

        .search-wrap .scount {
            font-size: .72rem;
            color: var(--muted);
            min-width: 34px;
            text-align: center;
        }

        .icon-btn {
            cursor: pointer;
            border: 0;
            background: transparent;
            color: var(--muted);
            font-size: .95rem;
            padding: .2rem .35rem;
            border-radius: 6px;
            line-height: 1;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--accent);
        }

        .fs-group {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface-2);
        }

        .fs-group button {
            border: 0;
            background: transparent;
            color: var(--text-soft);
            cursor: pointer;
            padding: .34rem .55rem;
            font-family: inherit;
        }

        .fs-group button:hover {
            background: var(--border);
            color: var(--accent);
        }

        #menuBtn {
            display: none;
        }

        /* ===================== LAYOUT ===================== */
        .layout {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 0;
            max-width: 1320px;
            margin: 0 auto;
        }

        .sidebar {
            position: sticky;
            top: 54px;
            align-self: start;
            height: calc(100vh - 54px);
            overflow: auto;
            border-right: 1px solid var(--border);
            padding: 1.1rem .9rem 3rem;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .sidebar h2 {
            font-size: .74rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            margin: .2rem .4rem 1rem;
        }

        .toc-actions {
            display: flex;
            gap: .4rem;
            margin: 0 .3rem 1rem;
        }

        .toc-actions button {
            flex: 1;
            cursor: pointer;
            border: 1px solid var(--border-strong);
            background: var(--surface-2);
            color: var(--text-soft);
            border-radius: 7px;
            padding: .34rem;
            font-size: .72rem;
            font-family: inherit;
        }

        .toc-actions button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .toc-group {
            margin-bottom: .25rem;
        }

        .toc-unit {
            display: flex;
            align-items: baseline;
            gap: .5rem;
            padding: .42rem .55rem;
            border-radius: 8px;
            color: var(--text-soft);
            font-weight: 600;
            font-size: .86rem;
            line-height: 1.3;
        }

        .toc-unit:hover {
            background: var(--surface-2);
            text-decoration: none;
            color: var(--accent);
        }

        .toc-unit.active {
            background: color-mix(in srgb, var(--accent) 14%, transparent);
            color: var(--accent);
        }

        .toc-num {
            display: inline-grid;
            place-items: center;
            min-width: 24px;
            height: 22px;
            padding: 0 .25rem;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            font-size: .68rem;
            font-weight: 700;
            flex: none;
        }

        .toc-subs {
            display: flex;
            flex-direction: column;
            margin: .1rem 0 .5rem .85rem;
            border-left: 1px solid var(--border);
        }

        .toc-sub {
            padding: .26rem .6rem;
            font-size: .78rem;
            color: var(--muted);
            border-left: 2px solid transparent;
            margin-left: -1px;
        }

        .toc-sub:hover {
            color: var(--accent);
            text-decoration: none;
            border-left-color: var(--accent);
        }

        .toc-sub.active {
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        main {
            min-width: 0;
            padding: 1.6rem clamp(.8rem, 3vw, 2.4rem) 4rem;
        }

        .reading-wrap {
            max-width: 880px;
            margin: 0 auto;
        }

        /* ===================== PORTADA ===================== */
        .hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2.4rem 2rem;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(900px 200px at 50% -40%, color-mix(in srgb, var(--accent) 16%, transparent), transparent);
        }

        .hero .kicker {
            position: relative;
            font-family: "Segoe UI", system-ui, sans-serif;
            letter-spacing: .22em;
            text-transform: uppercase;
            font-size: .72rem;
            color: var(--accent);
            font-weight: 700;
        }

        .hero h1 {
            position: relative;
            font-size: clamp(1.7rem, 4.4vw, 2.7rem);
            margin: .6rem 0 .4rem;
            color: var(--text);
            line-height: 1.15;
        }

        .hero p {
            position: relative;
            color: var(--muted);
            max-width: 60ch;
            margin: .3rem auto 0;
            font-size: 1rem;
        }

        .hero .meta {
            position: relative;
            display: flex;
            gap: .6rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.3rem;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .hero .chip {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: .3rem .8rem;
            font-size: .78rem;
            color: var(--text-soft);
        }

        /* ===================== ÍNDICE ===================== */
        #indice {
            margin-top: 2.2rem;
            scroll-margin-top: 70px;
        }

        #indice .idx-title {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 1.35rem;
            color: var(--accent-ink);
            margin-bottom: 1rem;
        }

        .idx-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: .9rem;
        }

        .idx-card {
            display: block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.1rem;
            box-shadow: var(--shadow-sm);
            transition: transform .14s, border-color .14s, box-shadow .14s;
            color: var(--text);
        }

        .idx-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: var(--shadow);
            text-decoration: none;
        }

        .idx-card .ic-top {
            display: flex;
            align-items: center;
            gap: .55rem;
            font-family: "Segoe UI", system-ui, sans-serif;
            margin-bottom: .4rem;
        }

        .idx-card .ic-num {
            display: inline-grid;
            place-items: center;
            min-width: 34px;
            height: 34px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            font-weight: 800;
            font-size: .92rem;
        }

        .idx-card h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--accent-ink);
            font-family: "Segoe UI", system-ui, sans-serif;
            line-height: 1.25;
        }

        .idx-card p {
            margin: .2rem 0 0;
            font-size: .84rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .idx-card.star {
            border-color: var(--accent-2);
            background: linear-gradient(180deg, var(--surface), color-mix(in srgb, var(--accent-2) 8%, var(--surface)));
        }

        .idx-card .badge {
            display: inline-block;
            margin-top: .55rem;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: .68rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
            background: var(--accent-2);
            padding: .18rem .5rem;
            border-radius: 999px;
        }

        /* ===================== UNIDADES ===================== */
        section.unit {
            margin-top: 2.6rem;
            scroll-margin-top: 70px;
        }

        .unit-head {
            display: flex;
            align-items: center;
            gap: .8rem;
            padding: 1rem 1.2rem;
            border-radius: 14px 14px 0 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        .unit-num {
            display: inline-grid;
            place-items: center;
            min-width: 46px;
            height: 46px;
            border-radius: 11px;
            background: rgba(255, 255, 255, .18);
            font-family: "Segoe UI", system-ui, sans-serif;
            font-weight: 800;
            font-size: 1.15rem;
            flex: none;
            border: 1px solid rgba(255, 255, 255, .25);
        }

        .unit-title {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: clamp(1.12rem, 2.4vw, 1.5rem);
            line-height: 1.2;
            flex: 1;
        }

        .collapse-btn {
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .4);
            background: rgba(255, 255, 255, .12);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 9px;
            font-size: 1rem;
            display: grid;
            place-items: center;
            transition: transform .2s;
            flex: none;
        }

        .collapse-btn:hover {
            background: rgba(255, 255, 255, .25);
        }

        section.unit.collapsed .collapse-btn {
            transform: rotate(-90deg);
        }

        .unit-body {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 0;
            border-radius: 0 0 14px 14px;
            padding: 1.6rem clamp(1rem, 2.5vw, 2rem) 1.4rem;
            box-shadow: var(--shadow);
        }

        section.unit.collapsed .unit-body {
            display: none;
        }

        .unit.star .unit-head {
            background: linear-gradient(135deg, var(--accent-2), #7d5417);
        }

        /* Encabezados internos */
        .unit-body h3 {
            font-family: "Segoe UI", system-ui, sans-serif;
            color: var(--accent-ink);
            font-size: 1.22rem;
            margin: 2rem 0 .7rem;
            padding-bottom: .35rem;
            border-bottom: 2px solid var(--border);
            scroll-margin-top: 70px;
        }

        .unit-body h3:first-child {
            margin-top: .2rem;
        }

        .unit-body h4 {
            font-family: "Segoe UI", system-ui, sans-serif;
            color: var(--accent);
            font-size: 1.04rem;
            margin: 1.3rem 0 .5rem;
        }

        .unit-body p {
            margin: .7rem 0;
            color: var(--text-soft);
        }

        .unit-body ul,
        .unit-body ol {
            margin: .6rem 0 .9rem;
            padding-left: 1.4rem;
            color: var(--text-soft);
        }

        .unit-body li {
            margin: .32rem 0;
        }

        .unit-body strong {
            color: var(--text);
        }

        .lead {
            font-size: 1.04rem;
            color: var(--text) !important;
            border-left: 4px solid var(--accent);
            padding: .2rem 0 .2rem 1rem;
            margin: .4rem 0 1.2rem;
            font-style: italic;
        }

        .term {
            font-weight: 700;
            color: var(--accent-ink);
        }

        /* ===================== CALLOUTS ===================== */
        .callout {
            border-radius: 10px;
            padding: .9rem 1.05rem;
            margin: 1.1rem 0;
            border: 1px solid var(--border);
            border-left-width: 5px;
            box-shadow: var(--shadow-sm);
        }

        .callout .callout-t {
            font-family: "Segoe UI", system-ui, sans-serif;
            font-weight: 700;
            font-size: .92rem;
            display: flex;
            align-items: center;
            gap: .45rem;
            margin-bottom: .35rem;
        }

        .callout p {
            margin: .3rem 0;
        }

        .callout p:last-child {
            margin-bottom: 0;
        }

        .callout .ico {
            font-size: 1.05rem;
        }

        .callout.def {
            background: var(--def-bg);
            border-color: var(--def-bd);
        }

        .callout.def .callout-t {
            color: var(--def-tx);
        }

        .callout.imp {
            background: var(--imp-bg);
            border-color: var(--imp-bd);
        }

        .callout.imp .callout-t {
            color: var(--imp-tx);
        }

        .callout.ej {
            background: var(--ej-bg);
            border-color: var(--ej-bd);
        }

        .callout.ej .callout-t {
            color: var(--ej-tx);
        }

        .callout.rec {
            background: var(--rec-bg);
            border-color: var(--rec-bd);
        }

        .callout.rec .callout-t {
            color: var(--rec-tx);
        }

        .callout.err {
            background: var(--err-bg);
            border-color: var(--err-bd);
        }

        .callout.err .callout-t {
            color: var(--err-tx);
        }

        .callout.note {
            background: var(--note-bg);
            border-color: var(--note-bd);
        }

        .callout.note .callout-t {
            color: var(--note-tx);
        }

        /* ===================== TABLAS ===================== */
        .tbl-wrap {
            overflow-x: auto;
            margin: 1.2rem 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        table.tbl {
            border-collapse: collapse;
            width: 100%;
            font-size: .92rem;
            background: var(--surface);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        table.tbl caption {
            caption-side: top;
            text-align: left;
            font-weight: 700;
            color: var(--accent-ink);
            padding: .7rem .9rem;
            font-size: .95rem;
        }

        table.tbl th,
        table.tbl td {
            border: 1px solid var(--border);
            padding: .6rem .75rem;
            text-align: left;
            vertical-align: top;
            color: var(--text-soft);
        }

        table.tbl thead th {
            background: color-mix(in srgb, var(--accent) 16%, var(--surface));
            color: var(--accent-ink);
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        table.tbl tbody tr:nth-child(even) {
            background: var(--surface-2);
        }

        table.tbl tbody tr:hover {
            background: color-mix(in srgb, var(--accent) 8%, var(--surface));
        }

        table.tbl td strong {
            color: var(--text);
        }

        /* ===================== ESQUEMAS / FLUJOS ===================== */
        .flow {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            gap: .5rem;
            margin: 1.2rem 0;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .flow-step {
            flex: 1 1 130px;
            min-width: 120px;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: .7rem .8rem;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .flow-step .fs-n {
            font-size: .7rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: .08em;
        }

        .flow-step .fs-t {
            font-weight: 700;
            color: var(--text);
            font-size: .86rem;
            margin: .15rem 0;
        }

        .flow-step .fs-d {
            font-size: .78rem;
            color: var(--muted);
            line-height: 1.45;
        }

        .flow-step:not(:last-child)::after {
            content: "›";
            position: absolute;
            right: -.7rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 700;
            z-index: 2;
        }

        @media(max-width:560px) {
            .flow-step:not(:last-child)::after {
                content: "⌄";
                right: 50%;
                top: auto;
                bottom: -1.1rem;
                transform: translateX(50%);
            }
        }

        .keybox {
            background: var(--surface-2);
            border: 1px dashed var(--border-strong);
            border-radius: 10px;
            padding: .9rem 1.1rem;
            margin: 1.1rem 0;
        }

        .keybox h4 {
            margin: .1rem 0 .5rem;
        }

            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: .35rem .9rem;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: .88rem;
        }

        .keybox dt {
            font-weight: 700;
            color: var(--accent-ink);
        }

        .keybox dd {
            margin: 0;
            color: var(--text-soft);
        }

        /* ===================== EXAMEN / RESUMEN ===================== */
        .exam {
            margin-top: 2rem;
            background: linear-gradient(180deg, var(--surface-2), var(--surface));
            border: 1px solid var(--border);
            border-left: 5px solid var(--accent-2);
            border-radius: 10px;
            padding: 1.1rem 1.2rem;
        }

        .exam h3 {
            border: 0;
            margin: .1rem 0 .7rem;
            color: var(--accent-2) !important;
        }

        .exam ol {
            padding-left: 1.3rem;
        }

        .exam li {
            margin: .55rem 0;
        }

        .exam details {
            margin: .35rem 0 .2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .1rem .7rem;
        }

        .exam summary {
            cursor: pointer;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: .82rem;
            color: var(--accent);
            font-weight: 600;
            padding: .4rem 0;
        }

        .exam details[open] {
            padding-bottom: .6rem;
        }

        .exam details p {
            margin: .3rem 0 .2rem;
            font-size: .92rem;
        }

        .summary {
            margin-top: 1.6rem;
            background: color-mix(in srgb, var(--accent) 8%, var(--surface));
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.1rem 1.2rem;
        }

        .summary h3 {
            border: 0;
            margin: .1rem 0 .6rem;
        }

        .summary ul {
            margin: .3rem 0;
        }

        .back-to-index {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            margin-top: 1.8rem;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: .82rem;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--border-strong);
            background: var(--surface-2);
            border-radius: 999px;
            padding: .42rem .95rem;
        }

        .back-to-index:hover {
            border-color: var(--accent);
            text-decoration: none;
            background: color-mix(in srgb, var(--accent) 10%, var(--surface));
        }

        /* ===================== MARCAS DE BÚSQUEDA ===================== */
        mark.s-hit {
            background: var(--mark);
            color: inherit;
            border-radius: 3px;
            padding: 0 .05em;
        }

        mark.s-hit.active {
            background: var(--mark-active);
            color: #1b1b1b;
            box-shadow: 0 0 0 2px var(--mark-active);
        }

        /* ===================== BOTONES FLOTANTES ===================== */
        #toTop {
            position: fixed;
            right: 1.1rem;
            bottom: 1.1rem;
            z-index: 45;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 0;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-ink));
            color: #fff;
            font-size: 1.2rem;
            box-shadow: var(--shadow);
            opacity: 0;
            visibility: hidden;
            transform: translateY(12px);
            transition: .25s;
        }

        #toTop.show {
            opacity: 1;
            visibility: visible;
            transform: none;
        }

        #overlay {
            display: none;
        }

        /* ===================== FOOTER ===================== */
        .foot {
            max-width: 880px;
            margin: 3rem auto 0;
            text-align: center;
            color: var(--muted);
            font-size: .82rem;
            font-family: "Segoe UI", system-ui, sans-serif;
            border-top: 1px solid var(--border);
            padding-top: 1.2rem;
        }

        /* ===================== RESPONSIVE ===================== */
        @media(max-width:900px) {
            #menuBtn {
                display: inline-flex;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                width: 285px;
                max-width: 85vw;
                background: var(--surface);
                z-index: 70;
                transform: translateX(-100%);
                transition: transform .25s;
                box-shadow: var(--shadow);
                padding-top: 1.2rem;
            }

            .sidebar.open {
                transform: none;
            }

            #overlay.show {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .45);
                z-index: 65;
            }

            .toolbar .brand .txt {
                display: none;
            }
        }

        @media(max-width:560px) {
            .search-wrap input {
                width: 40vw;
            }

            .toolbar {
                gap: .4rem;
                padding: .5rem .6rem;
            }
        }

        /* ===================== IMPRESIÓN / PDF A4 ===================== */
        @page {
            size: A4;
            margin: 16mm 14mm 18mm;
        }

        @media print {

            /* Forzar tema claro y conservar los colores del material en el PDF */
            html,
            html.dark {
                --bg: #ffffff;
                --bg2: #ffffff;
                --surface: #ffffff;
                --surface-2: #ffffff;
                --text: #1c2530;
                --text-soft: #2c3742;
                --muted: #55606b;
            }

            :root {
                --reading-size: 10.8pt;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            html,
            body {
                background: #fff !important;
                line-height: 1.5;
            }

            /* Ocultar toda la interfaz interactiva */
            .toolbar,
            .sidebar,
            #toTop,
            #overlay,
            #progress,
            .back-to-index,
            .toc-actions,
            .collapse-btn,
            #menuBtn {
                display: none !important;
            }

            .layout {
                display: block;
                max-width: none;
                margin: 0;
                gap: 0;
            }

            main {
                padding: 0;
            }

            .reading-wrap {
                max-width: none;
            }

            /* Portada en su propia hoja */
            .hero {
                break-after: page;
                border: 1px solid var(--border-strong);
            }

            /* Cada unidad comienza en una hoja nueva */
            section.unit {
                break-before: page;
                margin-top: 0;
            }

            section.unit.collapsed .unit-body {
                display: block !important;
            }

            /* Quitar sombras (no se ven en papel) */
            .unit-head,
            .unit-body,
            .callout,
            .tbl-wrap,
            .exam,
            .summary,
            .idx-card,
            .hero,
            .flow-step,
            .keybox {
                box-shadow: none !important;
            }

            /* Evitar cortes internos poco elegantes */
            .callout,
            table.tbl,
            .flow,
            .flow-step,
            .exam li,
            .summary,
            .keybox,
            figure,
            .idx-card,
            details {
                break-inside: avoid;
            }

            h2,
            h3,
            h4 {
                break-after: avoid;
            }

            table.tbl thead th {
                position: static;
            }

            a {
                text-decoration: none;
            }

            mark.s-hit {
                background: transparent !important;
                box-shadow: none;
            }

            /* Mostrar todas las respuestas del examen al imprimir */
            .exam summary {
                display: none;
            }

            .exam details>*:not(summary) {
                display: block !important;
            }
        }
    </style>

        // Variables de estado
        let currentGameMode = 'normal'; // 'normal' o 'hard'

        // Expresión regular para encontrar normativas automáticamente
        const normRegex = /(ley|decreto|resolución|resolucion|artículo|art\.|convención|protocolo|documento n|rubro 846)/i;

        const sections = [...new Set(bank.map(item => item.section))];

        const resultCard = document.getElementById("resultCard");
        const scoreText = document.getElementById("scoreText");
        const scoreSub = document.getElementById("scoreSub");        const themeBtn = document.getElementById("themeBtn");

        const questionCount = document.getElementById("questionCount");
        const startGameBtn = document.getElementById("startGameBtn");
        const submitGameBtn = document.getElementById("submitGameBtn");
        const gameTitle = document.getElementById("gameTitle");
        const gameDesc = document.getElementById("gameDesc");

        function toggleTheme() {
            currentTheme = currentTheme === "dark" ? "light" : "dark";
            if (currentTheme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        }

        function escapeHtml(str) {
            return str
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function shuffle(array) {
            const copy = [...array];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function stopSpeech() {
            if ("speechSynthesis" in window) {
                window.speechSynthesis.cancel();
            }
        }

        function speakText(text) {
            stopSpeech();
            if (!("speechSynthesis" in window)) {
                alert("Tu navegador no soporta texto a voz.");
                return;
            }
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = "es-ES";
            utter.rate = 1;
            utter.pitch = 1;
            window.speechSynthesis.speak(utter);
        }

        function buildGameQuestion(item, idx) {
            const options = shuffle([item.a, ...item.distractors]).slice(0, 4);
            return {
                id: `${item.section}-${idx}-${Math.random().toString(36).slice(2, 8)}`,
                section: item.section,
                q: item.q,
                a: item.a,
                options
            };
        }

        function renderGame() {
            resultCard.classList.remove("show");

            // Filtrar el banco de datos según el modo seleccionado
            let activeBank = bank;

            if (currentGameMode === 'hard') {
                activeBank = bank.filter(item => normRegex.test(item.q) || normRegex.test(item.a));
                gameTitle.textContent = "⚖️ Examen Normativo (Difícil)";
                gameDesc.textContent = "Filtrado automático: Solamente respondiendo preguntas sobre leyes, decretos, resoluciones y protocolos.";
                startGameBtn.className = "btn btn-hard";
            } else {
                gameTitle.textContent = "🎯 Examen General";
                gameDesc.textContent = "Elegí cuántas preguntas querés ver. Cada nueva carga mezcla preguntas y alternativas de todo el banco.";
                startGameBtn.className = "btn btn-accent";
            }

            // Determinar la cantidad de preguntas a mostrar
            let count = questionCount.value === "all" ? activeBank.length : Number(questionCount.value);
            count = Math.min(count, activeBank.length);

            // Si no hay suficientes preguntas normativas
            if (count === 0) {
                gameContent.innerHTML = "<p>No se encontraron preguntas bajo este criterio.</p>";
                return;
            }

            // Seleccionar las preguntas aleatorias
            const selected = shuffle(activeBank).slice(0, count);
            currentGame = selected.map(buildGameQuestion);

            const pillClass = currentGameMode === 'hard' ? 'pill pill-hard' : 'pill';

            // Renderizar
            gameContent.innerHTML = currentGame.map((item, index) => `
        <div class="callout note question-card" data-question-id="${escapeHtml(item.id)}" data-answer="${escapeHtml(item.a)}">
          <div class="callout-t" style="justify-content:space-between;">
            <span><span class="ico">📝</span> Pregunta ${index + 1} de ${count}</span>
            <span style="font-size:0.8rem; opacity:0.8;">${escapeHtml(item.section)}</span>
          </div>
          <p style="font-weight:bold; color:var(--text); font-size:1.1rem; margin-bottom:15px;">${escapeHtml(item.q)}</p>
          <div class="options" style="display:flex; flex-direction:column; gap:8px;">
            ${item.options.map(option => `
              <button class="tb-btn option" type="button" data-value="${escapeHtml(option)}" style="text-align:left; justify-content:flex-start; padding:10px;">
                ${escapeHtml(option)}
              </button>
            `).join("")}
          </div>
        </div>
      `).join("");

            gameContent.style.animation = 'none';
            void gameContent.offsetWidth;
            gameContent.style.animation = 'fadeIn 0.4s ease-out';

            if (gameSection.classList.contains("active")) {
                document.getElementById('gameSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            gameContent.querySelectorAll(".option").forEach(button => {
                button.addEventListener("click", () => {
                    const parent = button.closest(".question-card");
                    parent.querySelectorAll(".option").forEach(opt => opt.classList.remove("selected"));
                    button.classList.add("selected");
                    parent.dataset.selected = button.dataset.value;
                });
            });
        }

        function submitGame() {
            if (!currentGame.length) {
                renderGame();
                return;
            }

            let correct = 0;
            const cards = [...gameContent.querySelectorAll(".question-card")];

            cards.forEach(card => {
                const selected = card.dataset.selected || "";
                const answer = card.dataset.answer;

                card.querySelectorAll(".option").forEach(option => {
                    option.disabled = true;
                    const value = option.dataset.value;

                    option.classList.remove("correct", "wrong");

                    if (value === answer) option.classList.add("correct");
                    if (selected && value === selected && selected !== answer) option.classList.add("wrong");
                });

                if (selected === answer) correct++;
            });

            const total = cards.length;
            const percent = Math.round((correct / total) * 100);

            let label = "Rendimiento bajo. Volvé a repasar esa normativa.";
            if (percent >= 50) label = "Buen avance. Estás logrando identificar las trampas.";
            if (percent >= 75) label = "Muy buen nivel. Estás reteniendo los detalles finos.";
            if (percent === 100) label = "Perfecto. Conocimiento dominado al máximo.";

            scoreText.textContent = `${correct}/${total}`;
            scoreSub.textContent = `${percent}% de aciertos · ${label}`;
            resultCard.classList.add("show");
            resultCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        
        function goHome() {
            if (gameSection.style.display === 'block') {
                gameSection.style.display = 'none';
                homeSection.style.display = 'block';
                resultCard.style.display = 'none';
                gameContent.innerHTML = '';
            } else {
                window.location.href = 'index.html';
            }
        }

        // Inicializadores de Eventos
        themeBtn.addEventListener("click", toggleTheme);

        const urlParams = new URLSearchParams(window.location.search);
        currentGameMode = urlParams.get('mode') === 'hard' ? 'hard' : 'normal';
        
        const homeSection = document.getElementById("homeSection");
        const gameSection = document.getElementById("gameSection");
        const openGame = document.getElementById("openGame");
        const openHardGame = document.getElementById("openHardGame");
        const gameTitle = document.getElementById("gameTitle");
        const gameDesc = document.getElementById("gameDesc");

        openGame.addEventListener("click", () => {
            currentGameMode = 'normal';
            homeSection.style.display = 'none';
            gameSection.style.display = 'block';
            gameTitle.textContent = "Examen General";
            gameDesc.textContent = "Elegí cuántas preguntas querés ver. Cada nueva carga mezcla preguntas y alternativas de todo el banco.";
            renderGame();
        });

        openHardGame.addEventListener("click", () => {
            currentGameMode = 'hard';
            homeSection.style.display = 'none';
            gameSection.style.display = 'block';
            gameTitle.textContent = "Examen Normativo";
            gameDesc.textContent = "Filtrado automático: Solamente respondiendo preguntas sobre leyes, decretos, resoluciones y protocolos.";
            renderGame();
        });

        startGameBtn.addEventListener("click", renderGame);
        submitGameBtn.addEventListener("click", submitGame);

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) stopSpeech();
        });
    </script>
