<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avanzado - Política Exterior</title>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --surface-2: #f1f5f9;
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0;
            --primary: #3b82f6; --primary-soft: #eff6ff; --accent: #2563eb;
            --danger: #ef4444; --success: #10b981; --font-main: 'Inter', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0f19; --surface: #111827; --surface-2: #1e293b;
                --text: #f1f5f9; --text-dim: #94a3b8; --border: #334155;
                --primary: #3b82f6; --primary-soft: #1e3a8a;
            }
        }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px; margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .option-btn {
            display: block; width: 100%; text-align: left; background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text); padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .option-btn.selected { border-color: var(--primary); background: var(--primary-soft); box-shadow: 0 0 0 2px var(--primary); }
        .screen { display: none; }
        .screen.active { display: block; }
        select { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .result-item { border-bottom: 1px solid var(--border); padding: 20px 0; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .badge.correct { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge.incorrect { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .explanation { background: var(--surface-2); padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--danger); font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen card active">
        <h1 style="text-align: center;">Simulador Nivel Experto</h1>
        <p style="text-align: center; color: var(--text-dim);">Política Exterior del Paraguay - Sin preguntas repetidas</p>
        <label>¿Cuántas preguntas deseas responder?</label>
        <select id="q-count">
            <option value="10">10 Preguntas</option>
            <option value="20">20 Preguntas</option>
            <option value="30">30 Preguntas</option>
            <option value="40" selected>40 Preguntas (Completo)</option>
        </select>
        <button class="btn" style="width: 100%;" onclick="startQuiz()">Comenzar Examen Aleatorio</button>
    </div>

    <div id="quiz-screen" class="screen card">
        <div style="color: var(--text-dim); font-weight: bold; margin-bottom: 20px;" id="q-counter"></div>
        <h2 id="q-text" style="margin-top: 0; margin-bottom: 20px;"></h2>
        <div id="options-container"></div>
        <div style="text-align: right; margin-top: 20px;">
            <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Siguiente</button>
        </div>
    </div>

    <div id="results-screen" class="screen card">
        <h1 style="text-align: center;">Resultados Finales</h1>
        <div style="text-align: center; font-size: 40px; font-weight: bold; color: var(--accent); margin: 20px 0;" id="score-text"></div>
        <div id="results-details"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="location.reload()">Volver a Jugar</button>
        </div>
    </div>
</div>

    let currentQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let currentSelected = null;

    function shuffle(array) {
        let i = array.length, j;
        while (i !== 0) { j = Math.floor(Math.random() * i); i--; [array[i], array[j]] = [array[j], array[i]]; }
        return array;
    }

    function startQuiz() {
        const count = parseInt(document.getElementById('q-count').value);
        let shuffledBank = shuffle([...ALL_QUESTIONS]).slice(0, count);
        
        currentQuestions = shuffledBank.map(q => {
            let chosenIncorrects = shuffle([...q.incorrects]).slice(0, 3);
            let options = [{ text: q.correct, isCorrect: true }];
            chosenIncorrects.forEach(inc => options.push({ text: inc.text, isCorrect: false, reason: inc.reason }));
            return { ...q, shuffledOptions: shuffle(options) };
        });

        currentIndex = 0;
        userAnswers = [];
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('q-counter').innerText = `Pregunta ${currentIndex + 1} de ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = q.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        currentSelected = null;
        document.getElementById('next-btn').disabled = true;
        
        q.shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                currentSelected = opt;
                document.getElementById('next-btn').disabled = false;
            };
            container.appendChild(btn);
        });
        
        document.getElementById('next-btn').innerText = currentIndex === currentQuestions.length - 1 ? 'Finalizar Examen' : 'Siguiente';
    }

    function nextQuestion() {
        userAnswers.push(currentSelected);
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('results-screen').classList.add('active');
        
        let correctCount = 0;
        const details = document.getElementById('results-details');
        details.innerHTML = '';
        
        currentQuestions.forEach((q, i) => {
            const ans = userAnswers[i];
            if (ans.isCorrect) correctCount++;
            
            let html = `<div class="result-item">
                <div class="badge ${ans.isCorrect ? 'correct' : 'incorrect'}">${ans.isCorrect ? '¡Acertaste!' : 'Incorrecto'}</div>
                <h3 style="margin-top: 5px;">${i + 1}. ${q.question}</h3>
                <p><strong>Tu respuesta:</strong> ${ans.text}</p>`;
            
            if (!ans.isCorrect) {
                html += `<p style="color: var(--success);"><strong>Respuesta correcta:</strong> ${q.correct}</p>
                         <div class="explanation"><strong>Por qué tu elección es incorrecta:</strong><br>${ans.reason}</div>`;
            }
            html += `</div>`;
            details.innerHTML += html;
        });
        
        const pct = Math.round((correctCount / currentQuestions.length) * 100);
        document.getElementById('score-text').innerText = `${pct}% (${correctCount}/${currentQuestions.length})`;
    }
</script>
