<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Examen Extremo - Régimen Consular</title>
<style>
    /* ============================================================
       BASE Y VARIABLES (Dark Premium Theme)
    ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --bg-body:       #0f172a; 
        --bg-panel:      #1e293b; 
        --bg-card:       #334155; 
        
        --text-main:     #cbd5e1; 
        --text-heading:  #f8fafc; 
        --text-muted:    #94a3b8; 
        
        --accent:        #3b82f6; 
        --accent-hover:  #2563eb; 
        
        --correct:       #10b981; 
        --correct-bg:    rgba(16, 185, 129, 0.15);
        --incorrect:     #ef4444; 
        --incorrect-bg:  rgba(239, 68, 68, 0.15);
        
        --font-main:     'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --shadow-lg:     0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }

    body {
        background-color: var(--bg-body);
        color: var(--text-main);
        font-family: var(--font-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
    }

    .app-container {
        width: 100%;
        max-width: 850px;
        background: var(--bg-panel);
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
    }

    h1, h2 { color: var(--text-heading); margin-bottom: 20px; text-align: center; }
    p { margin-bottom: 20px; font-size: 1.1rem; line-height: 1.6; text-align: center; }

    /* ============================================================
       PANTALLAS
    ============================================================ */
    .screen { display: none; animation: fadeIn 0.4s ease; }
    .screen.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ============================================================
       PANTALLA DE INICIO
    ============================================================ */
    .setup-container { text-align: center; padding: 20px 0; }
    .slider-wrapper { margin: 40px 0; }
    
    input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        max-width: 400px;
        background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 28px; width: 28px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        margin-top: -10px;
        box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }
    input[type=range]::-webkit-slider-runnable-track {
        width: 100%; height: 8px;
        cursor: pointer;
        background: var(--bg-card);
        border-radius: 4px;
    }
    
    .question-count-display {
        font-size: 3.5rem;
        font-weight: 800;
        color: var(--accent);
        margin: 15px 0;
    }

    .btn {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 16px 32px;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .btn:disabled { background: var(--bg-card); color: var(--text-muted); cursor: not-allowed; transform: none; }

    /* ============================================================
       PANTALLA DE QUIZ
    ============================================================ */
    .progress-bar {
        width: 100%; height: 6px;
        background: var(--bg-card);
        border-radius: 4px;
        margin-bottom: 30px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%; background: var(--accent);
        width: 0%; transition: width 0.3s ease;
    }

    .question-header {
        display: flex; justify-content: space-between;
        color: var(--text-muted);
        font-size: 0.9rem; margin-bottom: 15px; font-weight: 600; text-transform: uppercase;
    }

    .question-text {
        font-size: 1.25rem; font-weight: 700; color: var(--text-heading); margin-bottom: 30px; line-height: 1.5; text-align: left;
    }

    .options-grid {
        display: flex; flex-direction: column; gap: 12px;
    }

    .option-btn {
        background: var(--bg-card);
        border: 2px solid transparent;
        color: var(--text-main);
        padding: 18px 24px;
        font-size: 1.05rem;
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s;
        line-height: 1.5;
    }
    .option-btn:hover:not(:disabled) {
        background: #3f516a; border-color: var(--accent);
    }
    
    .option-btn.correct {
        background: var(--correct-bg); border-color: var(--correct); color: #fff;
    }
    .option-btn.incorrect {
        background: var(--incorrect-bg); border-color: var(--incorrect); color: #fff;
    }
    .option-btn:disabled { cursor: default; }

    .action-bar {
        display: flex; justify-content: flex-end; margin-top: 30px;
    }

    /* ============================================================
       PANTALLA DE RESULTADOS
    ============================================================ */
    .results-container { text-align: center; padding: 30px 0; }
    .score-circle {
        width: 160px; height: 160px;
        border-radius: 50%;
        background: var(--bg-card);
        border: 8px solid var(--accent);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 30px;
        font-size: 2.8rem; font-weight: 800; color: #fff;
    }
    .feedback-msg { font-size: 1.2rem; margin-bottom: 40px; color: var(--text-muted); line-height: 1.5; }

    @media (max-width: 600px) {
        .app-container { padding: 30px 20px; border-radius: 16px; }
        .question-text { font-size: 1.15rem; }
        .option-btn { padding: 15px 20px; font-size: 0.95rem; }
    }
</style>
</head>
<body>

<div class="app-container">
    
    <!-- PANTALLA 1: SETUP -->
    <div id="screen-setup" class="screen active">
        <div class="setup-container">
            <h1>Modo Entrenamiento Experto</h1>
            <p style="color: var(--text-muted); font-size:0.95rem;">Régimen, Corte Administrativo, Alquileres y Gastos.<br>Opciones de trampa calibradas por longitud y gramática.</p>
            
            <div class="slider-wrapper">
                <input type="range" id="q-count-slider" min="1" max="50" value="25">
                <div class="question-count-display" id="q-count-display">25</div>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Preguntas a responder de un total de <span id="total-q-badge">50</span>.</p>
            </div>

            <button class="btn" id="start-btn">Iniciar Simulación Extrema</button>
        </div>
    </div>

    <!-- PANTALLA 2: QUIZ -->
    <div id="screen-quiz" class="screen">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-header">
            <span id="q-counter">Pregunta 1 de 25</span>
            <span id="q-type-badge">Selección Múltiple</span>
        </div>
        
        <div class="question-text" id="q-text">Cargando pregunta...</div>
        
        <div class="options-grid" id="options-grid"></div>

        <div class="action-bar">
            <button class="btn" id="next-btn" style="display:none;">Continuar ➔</button>
        </div>
    </div>

    <!-- PANTALLA 3: RESULTADOS -->
    <div id="screen-results" class="screen">
        <div class="results-container">
            <h2>Reporte de Evaluación</h2>
            <div class="score-circle" id="score-circle">0/25</div>
            <div class="feedback-msg" id="feedback-msg">Evaluando...</div>
            <button class="btn" id="restart-btn">Reiniciar Ciclo de Estudio</button>
        </div>
    </div>

</div>

    // LÓGICA DEL SIMULADOR

    let selectedQuestions = [];

    const screenQuiz = document.getElementById('screen-quiz');
    const screenResults = document.getElementById('screen-results');
    
    const slider = document.getElementById('q-count-slider');
    const sliderDisplay = document.getElementById('q-count-display');
    const totalBadge = document.getElementById('total-q-badge');
    const startBtn = document.getElementById('start-btn');
    
    const qCounter = document.getElementById('q-counter');
    const qTypeBadge = document.getElementById('q-type-badge');
    const qText = document.getElementById('q-text');
    const optionsGrid = document.getElementById('options-grid');
    const nextBtn = document.getElementById('next-btn');
    const progressFill = document.getElementById('progress-fill');

    // Setup inicial
    totalBadge.textContent = db.length;
    slider.max = db.length;
    slider.value = 25; // Default recomendado
    sliderDisplay.textContent = slider.value;

    slider.addEventListener('input', (e) => {
        sliderDisplay.textContent = e.target.value;
    });

    // Fisher-Yates shuffle
    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    startBtn.addEventListener('click', () => {
        let count = parseInt(slider.value);
        let shuffledDb = shuffleArray([...db]);
        selectedQuestions = shuffledDb.slice(0, count);
        currentQuestionIndex = 0;
        score = 0;
        showScreen('screen-quiz');
        renderQuestion();
    });

    function renderQuestion() {
        nextBtn.style.display = 'none';
        optionsGrid.innerHTML = '';
        
        let q = selectedQuestions[currentQuestionIndex];
        
        qCounter.textContent = `Pregunta ${currentQuestionIndex + 1} de ${selectedQuestions.length}`;
        progressFill.style.width = `${((currentQuestionIndex) / selectedQuestions.length) * 100}%`;
        qText.textContent = q.text;

        if (q.type === 'tf') {
            qTypeBadge.textContent = "Falso / Verdadero";
            qTypeBadge.style.color = "#a78bfa"; 
            
            createOptionButton('Verdadero', q.correct === true);
            createOptionButton('Falso', q.correct === false);
        } else {
            qTypeBadge.textContent = "Selección Múltiple";
            qTypeBadge.style.color = "#38bdf8"; 
            
            // Selección aleatoria de 3 trampas de las 7 disponibles
            let trapPool = shuffleArray([...q.traps]);
            let selectedTraps = trapPool.slice(0, 3);
            
            let finalOptions = [
                { text: q.correct, isCorrect: true },
                { text: selectedTraps[0], isCorrect: false },
                { text: selectedTraps[1], isCorrect: false },
                { text: selectedTraps[2], isCorrect: false }
            ];
            
            finalOptions = shuffleArray(finalOptions);
            
            finalOptions.forEach(opt => {
                createOptionButton(opt.text, opt.isCorrect);
            });
        }
    }

    function createOptionButton(text, isCorrect) {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = text;
        
        // Identificador invisible para revelar la correcta después
        btn.dataset.correct = isCorrect; 
        
        btn.onclick = () => handleAnswer(btn, isCorrect);
        optionsGrid.appendChild(btn);
    }

    function handleAnswer(clickedBtn, isCorrect) {
        const allBtns = optionsGrid.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            b.disabled = true;
            if (b.dataset.correct === 'true') { 
                b.classList.add('correct');
            }
        });

        if (isCorrect) {
            score++;
        } else {
            clickedBtn.classList.add('incorrect');
        }

        nextBtn.style.display = 'block';
    }

    nextBtn.addEventListener('click', () => {
        currentQuestionIndex++;
        if (currentQuestionIndex >= selectedQuestions.length) {
            endQuiz();
        } else {
            renderQuestion();
        }
    });

    function endQuiz() {
        showScreen('screen-results');
        document.getElementById('score-circle').textContent = `${score}/${selectedQuestions.length}`;
        
        let pct = (score / selectedQuestions.length) * 100;
        let msg = document.getElementById('feedback-msg');
        
        if(pct === 100) msg.textContent = "¡Rendimiento Perfecto! Dominas el régimen a nivel normativo y técnico.";
        else if (pct >= 85) msg.textContent = "¡Sobresaliente! Tienes un conocimiento excepcional de los procedimientos y plazos.";
        else if (pct >= 70) msg.textContent = "Aprobado. Buen manejo general, pero los detalles y excepciones requieren un repaso extra.";
        else msg.textContent = "Evaluación Insuficiente. La similitud en las respuestas requiere que memorices la norma con mayor precisión. ¡Sigue practicando!";
    }

    document.getElementById('restart-btn').addEventListener('click', () => {
        showScreen('screen-setup');
    });
