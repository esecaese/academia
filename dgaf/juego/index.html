<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen - Práctica Financiera (24 Preguntas)</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --container-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #4a90e2;
            --accent-hover: #357abd;
            --correct: #27ae60;
            --incorrect: #c0392b;
            --border: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        p {
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="number"] {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .option-btn {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            text-align: left;
            margin-bottom: 10px;
            padding: 15px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #2a2a2a;
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .correct {
            background-color: rgba(39, 174, 96, 0.2) !important;
            border-color: var(--correct) !important;
        }

        .incorrect {
            background-color: rgba(192, 57, 43, 0.2) !important;
            border-color: var(--incorrect) !important;
        }

        #feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            border-left: 4px solid var(--accent);
            background-color: var(--bg-color);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none !important;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        #final-score-container {
            text-align: center;
        }
        
        #final-score {
            font-size: 3rem;
            color: var(--accent);
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Configuración -->
    <div id="setup-screen" class="container">
        <h1>Simulador Total: Práctica Financiera</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">
            Este simulador contiene los <strong>24 puntos clave</strong> definidos por el profesor. Las preguntas y el orden de las respuestas se mezclarán de forma aleatoria para evitar la memorización mecánica.
        </p>
        <div class="input-group">
            <label for="num-questions">¿Cuántas preguntas deseás responder en esta ronda? (Máximo 24)</label>
            <input type="number" id="num-questions" min="1" max="24" value="24">
        </div>
        <button onclick="startGame()">Comenzar Examen</button>
    </div>

    <!-- Pantalla del Juego -->
    <div id="game-screen" class="container hidden">
        <div class="stats">
            <span id="progress-text">Pregunta 1 de 24</span>
            <span id="score-text">Aciertos: 0</span>
        </div>
        
        <h2 id="question-text" style="font-size: 1.15rem; margin-bottom: 20px; font-weight: 500; line-height: 1.5; color: var(--accent);"></h2>
        
        <div id="options-container"></div>
        
        <div id="feedback-box">
            <strong id="feedback-title" style="display: block; margin-bottom: 8px; font-size: 1.1rem;"></strong>
            <p id="feedback-desc" style="font-size: 0.95rem; color: var(--text-main); margin: 0; line-height: 1.5;"></p>
            <button id="next-btn" onclick="nextQuestion()" style="margin-top: 15px;">Siguiente Pregunta</button>
        </div>
    </div>

    <!-- Pantalla de Resultados -->
    <div id="result-screen" class="container hidden">
        <h1>Examen Finalizado</h1>
        <div id="final-score-container">
            <p style="font-size: 1.2rem; color: var(--text-main);">Tu puntaje final es:</p>
            <div id="final-score"></div>
            <p id="final-message" style="color: var(--text-muted); margin-bottom: 30px; line-height: 1.5;"></p>
        </div>
        <button onclick="location.reload()">Volver al Inicio</button>
    </div>

    <script>
        // Base de datos COMPLETA con los 24 puntos del profesor
        const questionDatabase = [
            {
                q: "1. ¿Qué porcentaje del viático exige presentación de comprobantes de respaldo (facturas, tickets) para su rendición de cuentas?",
                correct: "El 80% (el 20% restante puede ser por Declaración Jurada).",
                distractors: ["El 100% de los gastos.", "El 50% con facturas y el otro 50% con vales internos.", "El 20% con facturas (el 80% restante por Declaración Jurada)."],
                justification: "Según el Art. 7, se exige comprobantes de respaldo como mínimo del 80%. El saldo restante podrá ser justificado bajo Declaración Jurada."
            },
            {
                q: "2. ¿Qué significan las siglas S.T.R. manejadas por el Departamento de Contabilidad?",
                correct: "Solicitud de Transferencias de Recursos.",
                distractors: ["Sistema de Trámites de Rendición.", "Solicitud de Tesorería Regional.", "Servicio de Transferencias Rápidas."],
                justification: "S.T.R. significa Solicitud de Transferencias de Recursos, gestionado por el Departamento de Contabilidad de la DGAF."
            },
            {
                q: "3. ¿A qué Fuente de Financiamiento (FF) corresponden los 'Recursos Institucionales'?",
                correct: "FF 30",
                distractors: ["FF 10", "FF 20", "FF 40"],
                justification: "Las Fuentes de Financiamiento son: FF 10 (Recursos de Tesoro), FF 20 (Recursos del Crédito Público) y FF 30 (Recursos Institucionales)."
            },
            {
                q: "4. ¿Qué se debe hacer si se requiere utilizar un porcentaje mayor al 20% establecido para el Objeto del Gasto 280 (Otros Servicios en General) del G.O.M.?",
                correct: "Solicitar autorización previa al gasto a la Dirección General de Administración y Finanzas (DGAF).",
                distractors: ["Autorizarlo internamente bajo la exclusiva responsabilidad del Jefe de Misión.", "Imputarlo directamente al rubro de Reservas Técnicas (950).", "Solicitar permiso a la Contraloría General de la República a fin de mes."],
                justification: "Si se requiera utilizar un porcentaje mayor en el O.G. 280, se deberá solicitar autorización previa al gasto a la DGAF fundamentando las razones."
            },
            {
                q: "5. ¿En qué casos la DGAF podrá RETENER el desembolso de fondos para Gastos de Operación y Mantenimiento (G.O.M.)?",
                correct: "Por estar pendiente el envío de la rendición física del bimestre vencido o la documentación de devolución de excedentes.",
                distractors: ["Por exceder el tope del 10% en el rubro de productos alimenticios.", "Por falta de presentación de los contratos de alquiler traducidos.", "Por no depositar los excedentes en los primeros 5 días del mes."],
                justification: "Se retienen envíos GOM si está pendiente la rendición física del bimestre vencido en el plazo o la devolución del excedente del bimestre."
            },
            {
                q: "6. En el Servicio Exterior, ¿para qué se utiliza específicamente el rubro 950 de Reservas Técnicas y Cambiarias?",
                correct: "Para prever y compensar diferencias de cambio en concepto de alquiler de sedes y aporte jubilatorio.",
                distractors: ["Para cubrir gastos de pasajes y fletes por desarraigo.", "Para pagar indemnizaciones por accidentes ocurridos en actos de servicios.", "Para comprar bienes, muebles e inmuebles de emergencia para uso oficial."],
                justification: "El rubro 950 compensa diferencias por adquisición de divisas para aportes por diferencia cambiaria en alquiler de sedes y jubilatorio del empleador (IPS)."
            },
            {
                q: "7. ¿El rubro 950 de Reservas Técnicas también se usa para pagar qué tipo de gastos jubilatorios?",
                correct: "El IPS de los contratados (Aporte jubilatorio del empleador y/o seguridad social).",
                distractors: ["El aporte a la caja fiscal de los diplomáticos de carrera.", "El seguro médico privado del Jefe de Misión.", "Los fondos de pensión del personal diplomático extranjero."],
                justification: "Se utiliza para aportes por diferencia cambiaria en concepto de gastos de alquiler de sedes y jubilatorio del empleador y/o seguridad social (IPS de contratados)."
            },
            {
                q: "8. ¿Cuál es el tope porcentual establecido para el rubro 360 (Combustibles) dentro de los Gastos de Operación y Mantenimiento?",
                correct: "10%",
                distractors: ["15%", "20%", "25%"],
                justification: "Los topes del GOM son: 232 Viáticos (15%), 280 Otros Servicios (20%), 310 Productos alimenticios (10%) y 360 Combustibles (10%)."
            },
            {
                q: "9. ¿Qué requisito previo se necesita para los Alquileres en el exterior (Rubro 250 - Alquileres y Derechos)?",
                correct: "Requiere autorización previa de la DGAF.",
                distractors: ["Visto bueno exclusivo del Jefe de Misión.", "Aprobación de la Contraloría General de la República.", "Resolución directa de la Presidencia de la República."],
                justification: "Rubro 250 Alquileres y Derechos: Exige 'Previa autorización de la Dirección General de Administración y Finanzas (DGAF)'."
            },
            {
                q: "10. Respecto al GOM, ¿quién administra los fondos transferidos a cada sede en el exterior?",
                correct: "Cada sede tiene su monto y se le envía, ellos administran localmente bajo responsabilidad del Jefe de Misión.",
                distractors: ["Son administrados directamente desde Asunción por la DGAF mes a mes.", "La Contraloría de la República envía un delegado para administrarlos.", "El banco central del país receptor se encarga de la administración."],
                justification: "Se transfiere el GOM (mensualmente) a las Representaciones Diplomáticas. Cada sede tiene su monto y ellos administran localmente."
            },
            {
                q: "11. ¿Quién es el principal y último responsable por la administración y control del uso de los fondos transferidos (G.O.M.) en una Representación?",
                correct: "El Jefe de Misión.",
                distractors: ["El Funcionario Administrativo del Servicio Local.", "El Ministro Director de Finanzas en Asunción.", "El Oficial Contable de la Embajada."],
                justification: "Los Jefes de Misión serán responsables por la administración y control del uso de los fondos transferidos, y cumplimiento de las formalidades."
            },
            {
                q: "12. ¿Cuáles son los órganos encargados de los controles INTERNOS y EXTERNOS respectivamente?",
                correct: "Internos: Auditoría Interna, DGAF y Rendición de Cuentas. Externos: CGR y AGPE.",
                distractors: ["Internos: CGR y AGPE. Externos: Ministerio de Hacienda e IPS.", "Internos: DGAF y Hacienda. Externos: Banco Mundial.", "Internos: Jefe de Misión y Contadores. Externos: DGAF y Auditoría Interna."],
                justification: "Controles Internos: Auditoría Interna, DGAF y Rendición de Cuentas. Controles Externos: CGR (Contraloría General) y AGPE (Auditoría General del PE)."
            },
            {
                q: "13. ¿Cuál es la periodicidad de los envíos de fondos del GOM y de la presentación de las rendiciones de cuentas?",
                correct: "Monto de envío es Mensual. La rendición de cuentas es Bimestral.",
                distractors: ["Monto de envío Semestral. Rendición Mensual.", "Monto de envío Anual. Rendición Semestral.", "Monto de envío Bimestral. Rendición Mensual."],
                justification: "El profesor indicó: 'Periocidad es Bimestral (para las rendiciones). Monto de envió es mensual'."
            },
            {
                q: "14. ¿Cómo deben presentarse los documentos adjuntos a las facturas y contratos en la rendición de cuentas?",
                correct: "Documentos originales, traducidos al español (por lo menos versión no oficial), detallando lo respectivo a cada factura.",
                distractors: ["Solo copias simples en su idioma original para ahorrar papel.", "Traducidos exclusivamente por traductores juramentados de Asunción.", "En formato digital sin necesidad de enviar físicos ni traducciones."],
                justification: "Se requieren documentos originales y, si están en otro idioma, acompañados de su traducción al español, detallando lo respectivo a cada factura."
            },
            {
                q: "15. De acuerdo a los topes del GOM, ¿qué porcentaje le corresponde al Rubro 232 (Viáticos y movilidad) y al Rubro 280 (Otros Servicios)?",
                correct: "Viáticos 15% y Otros Servicios en General 20%.",
                distractors: ["Viáticos 10% y Otros Servicios 10%.", "Viáticos 20% y Otros Servicios 15%.", "Viáticos 50% y Otros Servicios 50%."],
                justification: "Topes del GOM: 232-Viáticos (15%), 280-Otros Servicios (20%), 310-Productos (10%), 360-Combustibles (10%)."
            },
            {
                q: "16. Dentro del rubro 320 (Textiles), ¿qué adquisición está tajantemente prohibida?",
                correct: "La compra de uniformes para funcionarios.",
                distractors: ["La compra de cortinas para la residencia del embajador.", "La adquisición de banderas de los países.", "La compra de manteles para eventos protocolares."],
                justification: "El material estipula claramente: '320 - TEXTILES: Queda prohibida la adquisición de uniformes para funcionarios'."
            },
            {
                q: "17. ¿Quiénes deben firmar la Planilla de Registro de Carga de Combustible (o similares) en las Misiones?",
                correct: "Los Jefes de Misión deben firmar junto con el funcionario que elaboró las planillas respectivas.",
                distractors: ["Exclusivamente el Jefe de Misión.", "Solo el chofer o encargado de transportar el vehículo.", "El contador local y el encargado de la estación de servicio."],
                justification: "El profesor destacó que los Jefes de Misión deben firmar en conjunto con el funcionario que elaboró las planillas, compartiendo la responsabilidad."
            },
            {
                q: "18. En el Servicio Exterior (SSE), ¿sobre qué concepto de la remuneración NO se paga aguinaldo?",
                correct: "Sobre el Costo de Vida / Gasto de Residencia.",
                distractors: ["Sobre los Sueldos Básicos (Rubro 161).", "Sobre los Gastos de Representación (Rubro 162).", "Sobre el Escalafón Diplomático (Rubro 139)."],
                justification: "El SSE cobra sueldo, aguinaldo y costo de vida, pero del costo de vida (Gasto de Residencia) NO se paga aguinaldo."
            },
            {
                q: "19. Si dos funcionarios que son cónyuges están destinados a prestar servicio en el exterior en una misma ciudad, ¿cómo se paga el alquiler de residencia?",
                correct: "Se le paga únicamente al funcionario que ostente el mayor rango.",
                distractors: ["Se abona el 100% del alquiler a ambos funcionarios por separado.", "Se divide el pago exactamente al 50% para cada uno de los cónyuges.", "Se aplica al funcionario que haya llegado primero al destino."],
                justification: "Si son cónyuges destinados en la misma ciudad, el pago en concepto de gasto de residencia se aplica SÓLO al funcionario que ostente el mayor rango."
            },
            {
                q: "20. ¿A partir de qué fecha corresponde el pago de los Gastos de Alquiler en el exterior?",
                correct: "Desde la fecha en que el funcionario asume oficialmente sus funciones en su destino (se debe notificar por nota al servicio local).",
                distractors: ["Desde el momento en que se emite su decreto de nombramiento en Asunción.", "Desde el día que alquila la casa, sin importar si ya asumió funciones.", "Desde el primer día del año fiscal en curso."],
                justification: "Gastos de Alquiler: Corresponde a partir de la fecha en la que el funcionario asume de manera oficial sus funciones en el exterior, notificando a RRHH/Servicio Local."
            },
            {
                q: "21. ¿Cuáles son los requisitos de presentación del comprobante (recibo) de pago de alquiler para la rendición mensual?",
                correct: "Debe remitirse el comprobante de pago en original y copia, reuniendo los requisitos legales del país sede y sin tachaduras.",
                distractors: ["Solo se requiere una nota firmada por el Jefe de Misión.", "Basta con un correo electrónico del propietario confirmando la recepción.", "Se exige únicamente un recibo común de librería comprado en Asunción."],
                justification: "Comprobante de recibo de alquiler: Debe enviarse en original y copia, reuniendo requisitos legales del país sede. Sin enmiendas ni tachaduras."
            },
            {
                q: "22. Respecto al Contrato de Alquiler en el exterior, ¿qué formalidad debe cumplirse si está en un idioma distinto al español o portugués?",
                correct: "Debe estar acompañado de su debida traducción al español.",
                distractors: ["Debe traducirse exclusivamente al inglés.", "No hace falta traducción si el contador de la DGAF entiende el idioma.", "Debe ser redactado nuevamente desde cero en español por un abogado paraguayo."],
                justification: "Los contratos de alquiler en idiomas distintos al español o portugués deben estar acompañados de su correspondiente traducción al español."
            },
            {
                q: "23. En el Servicio Local (SSL), ¿quiénes tienen derecho a percibir el Subsidio Familiar (hijos menores de 18 años)?",
                correct: "Solo los funcionarios que ganan hasta el salario mínimo.",
                distractors: ["Absolutamente todos los funcionarios con hijos menores de 18 años.", "Únicamente los funcionarios con rango diplomático en la Cancillería.", "Los funcionarios que tengan antigüedad superior a 10 años en el Ministerio."],
                justification: "SSL: Subsidio familiar es por hijos menores de 18 años, exclusivo SÓLO para los que ganan hasta el salario mínimo."
            },
            {
                q: "24. ¿A quiénes corresponde cobrar el rubro 113 de Gastos de Representación?",
                correct: "A los funcionarios que ocupan cargos que conllevan la representación legal de la Institución (cargos de Dirección, con firma).",
                distractors: ["A todos los contratados que viajan al exterior por motivos oficiales.", "Exclusivamente a los choferes y personal de seguridad del Ministro.", "A funcionarios de rango menor encargados de trámites bancarios."],
                justification: "Gasto de Representación: Remuneración adicional inherente al cargo para los que llevan la representación de Dirección, por ser representantes con firma legal."
            }
        ];

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Función para mezclar arrays
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startGame() {
            const numInput = document.getElementById('num-questions').value;
            const num = Math.min(Math.max(parseInt(numInput) || 24, 1), questionDatabase.length);
            
            // Mezclamos base de datos y cortamos
            const shuffledDB = shuffle([...questionDatabase]);
            selectedQuestions = shuffledDB.slice(0, num);
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('feedback-box').style.display = 'none';
            
            const currentQ = selectedQuestions[currentQuestionIndex];
            
            document.getElementById('progress-text').innerText = `Pregunta ${currentQuestionIndex + 1} de ${selectedQuestions.length}`;
            document.getElementById('score-text').innerText = `Aciertos: ${score}`;
            document.getElementById('question-text').innerText = currentQ.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            let allOptions = [...currentQ.distractors, currentQ.correct];
            allOptions = shuffle(allOptions);
            
            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, currentQ);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(clickedBtn, selectedAnswer, currentQ) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackDesc = document.getElementById('feedback-desc');
            
            if (selectedAnswer === currentQ.correct) {
                clickedBtn.classList.add('correct');
                feedbackTitle.innerText = "¡Correcto!";
                feedbackTitle.style.color = "var(--correct)";
                feedbackBox.style.borderLeftColor = "var(--correct)";
                score++;
                document.getElementById('score-text').innerText = `Aciertos: ${score}`;
            } else {
                clickedBtn.classList.add('incorrect');
                feedbackTitle.innerText = "Incorrecto";
                feedbackTitle.style.color = "var(--incorrect)";
                feedbackBox.style.borderLeftColor = "var(--incorrect)";
                
                // Resaltar la correcta
                buttons.forEach(btn => {
                    if (btn.innerText === currentQ.correct) {
                        btn.classList.add('correct');
                    }
                });
            }
            
            feedbackDesc.innerText = currentQ.justification;
            feedbackBox.style.display = 'block';
            
            if (currentQuestionIndex === selectedQuestions.length - 1) {
                document.getElementById('next-btn').innerText = "Ver Resultados Finales";
            } else {
                document.getElementById('next-btn').innerText = "Siguiente Pregunta";
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < selectedQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const percentage = (score / selectedQuestions.length) * 100;
            const finalScoreElement = document.getElementById('final-score');
            const finalMessageElement = document.getElementById('final-message');
            
            finalScoreElement.innerText = `${score} / ${selectedQuestions.length}`;
            
            if (percentage === 100) {
                finalScoreElement.style.color = "var(--correct)";
                finalMessageElement.innerHTML = "¡EXCELENTE!<br>Dominás todos los puntos clave. ¡Estás 100% listo para el examen!";
            } else if (percentage >= 70) {
                finalScoreElement.style.color = "var(--accent)";
                finalMessageElement.innerHTML = "¡MUY BIEN!<br>Tenés un dominio sólido del temario. Solo te falta repasar algunos detalles puntuales.";
            } else if (percentage >= 50) {
                finalScoreElement.style.color = "#f39c12"; // Naranja
                finalMessageElement.innerHTML = "¡APROBADO, PERO CON CUIDADO!<br>Conocés la base, pero hay reglas administrativas (como topes o retenciones) que debés fijar mejor.";
            } else {
                finalScoreElement.style.color = "var(--incorrect)";
                finalMessageElement.innerHTML = "¡HAY QUE SEGUIR ESTUDIANDO!<br>Utilizá las justificaciones de este simulador para aprender de los errores y volvé a intentarlo.";
            }
        }
    </script>
</body>
</html>
