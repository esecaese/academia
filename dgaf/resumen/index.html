<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso DGAF - Práctica Financiera y Administrativa I</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background-color: #141414;
            border: 1px solid #262626;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #404040;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .btn-play {
            transition: all 0.2s ease;
        }
        
        .btn-play:hover {
            background-color: #262626;
        }

        .btn-playing {
            background-color: #1e3a8a !important; /* Blue tint when playing */
            border-color: #3b82f6 !important;
            color: #bfdbfe !important;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #262626; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #404040; 
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 sm:px-6 lg:px-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center sm:text-left border-b border-neutral-800 pb-8">
            <h1 class="text-3xl sm:text-4xl font-semibold text-white tracking-tight mb-3">Práctica Financiera y Administrativa I</h1>
            <p class="text-neutral-400 text-lg font-light">Guía de estudio interactiva basada en la DGAF. Presiona el botón para escuchar cada punto.</p>
            <div class="mt-6 flex flex-wrap gap-4 justify-center sm:justify-start">
                <button id="stopAllBtn" onclick="stopSpeech()" class="hidden items-center gap-2 px-4 py-2 bg-red-900/30 text-red-400 border border-red-900/50 rounded-lg hover:bg-red-900/50 transition-colors text-sm font-medium">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                    Detener Lectura
                </button>
            </div>
        </header>

        <!-- Container for Q&A -->
        <div id="qa-container" class="space-y-6">
            <!-- Items will be injected here by JS -->
        </div>

        <footer class="mt-16 pt-8 border-t border-neutral-800 text-center text-neutral-500 text-sm">
            Academia DGAF - Material de Estudio
        </footer>
    </div>

    <script>
        const studyData = [
            {
                q: "1. Rendición de cuentas viajes al exterior (Viáticos)",
                a: "Para el rubro 232 - Viáticos y Movilidad, se exige la presentación de comprobantes de respaldo por al menos el 80% del monto otorgado. El saldo restante (hasta el 20%) podrá ser justificado bajo una Declaración Jurada de gastos."
            },
            {
                q: "2. ¿Qué es la S.T.R.?",
                a: "Son las siglas de Solicitud de Transferencias de Recursos. Es gestionada por el Departamento de Contabilidad."
            },
            {
                q: "3. Fuentes de Financiamiento (FF 10, 20, 30)",
                a: "Se clasifican en tres tipos principales: FF 10: Recursos del Tesoro. FF 20: Recursos del Crédito Público. FF 30: Recursos Institucionales."
            },
            {
                q: "4. GOM: Autorización para exceder el rubro 280",
                a: "El rubro 280 (Otros Servicios en General) tiene un tope del 20%. Si por motivos de servicio se requiere utilizar un porcentaje mayor, se debe solicitar autorización previa a la Dirección General de Administración y Finanzas (DGAF) fundamentando las razones. Esta autorización debe anexarse a la Rendición de Cuentas. Si no se autoriza, se debe devolver el excedente."
            },
            {
                q: "5. ¿En qué casos la DGAF podrá retener los envíos de GOM?",
                a: "La DGAF podrá retener los desembolsos por rendiciones en mora en dos casos específicos: Uno, si está pendiente el envío de la rendición física del bimestre vencido en el plazo establecido. Y dos, si está pendiente la documentación de la devolución del excedente del bimestre."
            },
            {
                q: "6 y 7. Rubro 950: Reservas Técnicas Cambiarias y pagos en el exterior",
                a: "El Rubro 950 son asignaciones para compensar diferencias de precios por adquisición de divisas. Específicamente, en el Servicio Exterior cubre la diferencia cambiaria para: Gastos de alquiler de sedes, y Aporte jubilatorio del empleador (IPS de contratados) o seguridad social."
            },
            {
                q: "8. Combustible (10%)",
                a: "En el GOM, el tope para el rubro 360 (Combustibles y Lubricantes) es del 10%. Para justificar este gasto se debe completar de manera bimestral la Planilla de Registro de Carga de Combustible."
            },
            {
                q: "9. Autorización de alquileres en el exterior",
                a: "Para el rubro 250 (Alquileres y Derechos), todo alquiler de bienes, muebles, inmuebles para uso oficial o sistema de leasing de vehículos requiere autorización previa de la DGAF."
            },
            {
                q: "10 y 11. Administración y Responsabilidad en Sedes",
                a: "Los fondos del Gasto de Operaciones y Mantenimiento (GOM) se transfieren a las representaciones diplomáticas. Los Jefes de Misión son los responsables directos por la administración, el control del uso de esos fondos transferidos y el cumplimiento de los plazos y formalidades de la rendición de cuentas."
            },
            {
                q: "12. Órganos de Control Interno y Externo",
                a: "Controles Internos: Auditoría Interna y la DGAF. Controles Externos: Contraloría General de la República (CGR) y la Auditoría General del Poder Ejecutivo (AGPE)."
            },
            {
                q: "13. Periodicidad",
                a: "Las rendiciones de cuentas del GOM tienen una periodicidad bimestral. Por ejemplo, los excedentes de caja deben depositarse dentro de los 15 días siguientes al bimestre vencido."
            },
            {
                q: "14. Documentos Originales y Traducciones",
                a: "Los funcionarios del servicio exterior son responsables de remitir sus comprobantes y contratos de alquiler en original o copia autenticada. Si los contratos de alquiler están en un idioma distinto del español o del portugués, es obligatorio acompañar la correspondiente traducción al español. Los comprobantes no deben tener tachaduras ni enmiendas."
            },
            {
                q: "15. Topes del GOM (Gasto de Operaciones y Mantenimiento)",
                a: "Los límites porcentuales establecidos son: 232 Viáticos y Movilidad: 15%. 280 Otros Servicios en General: 20%. 310 Productos Alimenticios: 10%. 360 Combustibles: 10%."
            },
            {
                q: "16. Prohibición de compra de uniformes",
                a: "Según las directrices del GOM, en el rubro 320 (Textiles) queda estrictamente prohibida la adquisición de uniformes para los funcionarios."
            },
            {
                q: "17. Firmas en las planillas (Jefes de Misión)",
                a: "Al ser los responsables principales por la administración y el control del uso de los fondos, los Jefes de Misión deben avalar la información con su firma en las rendiciones de cuenta, junto al responsable de la elaboración."
            },
            {
                q: "18. Costo de vida y el Aguinaldo en el Servicio Exterior (SSE)",
                a: "Los funcionarios perciben Sueldo, Gastos de Representación y Costo de Vida o Residencia. Sin embargo, el Costo de Vida no forma parte de la asignación salarial, por lo tanto, NO se paga aguinaldo sobre él. El aguinaldo se calcula únicamente sobre el sueldo base y los gastos de representación."
            },
            {
                q: "19. Alquiler de residencia para Cónyuges",
                a: "Si dos funcionarios que son cónyuges son designados para prestar servicio en la misma ciudad en el exterior, el pago en concepto de Gasto de Residencia se aplicará sólo al funcionario que ostente el mayor rango."
            },
            {
                q: "20. Fechas para el Gasto de Alquiler",
                a: "El pago correspondiente por el concepto de alquiler de residencia inicia a partir de la fecha exacta en la que el funcionario asuma de manera oficial sus funciones en el exterior, y se extiende hasta la fecha de término de su misión, notificada por Recursos Humanos."
            },
            {
                q: "21. Requisitos del Comprobante de alquiler",
                a: "Se debe remitir a la DGAF el comprobante del mes anterior en original o copia. Debe reunir los requisitos legales del país receptor y está estrictamente prohibido presentar comprobantes con enmiendas o tachaduras."
            },
            {
                q: "22. Contrato de Alquiler y Traducción",
                a: "Se deben remitir en versión original o copias autenticadas. Junto con ellos, una declaración jurada validando los datos, y si están en idiomas distintos al español o portugués, deben estar traducidos."
            },
            {
                q: "23. Subsidio Familiar (SSL)",
                a: "El rubro 131 (Subsidio Familiar) es un beneficio adicional presupuestado. Incluye el subsidio mensual por hijos menores de 18 años. Aplica principalmente a quienes ganan hasta el salario mínimo, además de cubrir otras asignaciones puntuales por nacimiento, defunción o escolaridad."
            },
            {
                q: "24. Gastos de Representación",
                a: "El rubro 113 (Gastos de Representación) es una remuneración adicional y accesoria al sueldo. Se otorga a los funcionarios que ocupan efectivamente cargos que conllevan la representación legal de la Institución y tienen firma oficial, como las Direcciones."
            }
        ];

        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let activeIndex = -1;

        function renderQuestions() {
            const container = document.getElementById('qa-container');
            
            studyData.forEach((item, index) => {
                const article = document.createElement('article');
                article.className = 'card rounded-xl p-5 sm:p-7 relative';
                
                article.innerHTML = `
                    <div class="flex flex-col sm:flex-row gap-4 justify-between items-start">
                        <div class="flex-1">
                            <h2 class="text-xl font-medium text-white mb-3 leading-snug">${item.q}</h2>
                            <p class="text-neutral-400 font-light leading-relaxed">${item.a}</p>
                        </div>
                        <button id="btn-${index}" onclick="toggleSpeech(${index})" class="btn-play shrink-0 inline-flex items-center gap-2 px-4 py-2 mt-2 sm:mt-0 rounded-lg border border-neutral-700 text-sm font-medium text-neutral-300 w-full sm:w-auto justify-center">
                            <svg class="w-4 h-4 icon-play" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                            <span class="btn-text">Escuchar</span>
                        </button>
                    </div>
                `;
                container.appendChild(article);
            });
        }

        function toggleSpeech(index) {
            const item = studyData[index];
            const textToSpeak = `${item.q}. ${item.a}`;

            if (activeIndex === index && synth.speaking) {
                // If clicking the currently playing item, stop it
                stopSpeech();
                return;
            }

            // Stop any current speech before starting new one
            stopSpeech();

            // Prepare new speech
            currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
            
            // Try to set Spanish voice
            const voices = synth.getVoices();
            const spanishVoice = voices.find(voice => voice.lang.startsWith('es-'));
            if (spanishVoice) {
                currentUtterance.voice = spanishVoice;
            }
            
            currentUtterance.lang = 'es-ES'; // Default fallback
            currentUtterance.rate = 0.95; // Slightly slower for better comprehension
            currentUtterance.pitch = 1;

            currentUtterance.onstart = () => {
                activeIndex = index;
                updateUIPplaying(index);
                document.getElementById('stopAllBtn').classList.remove('hidden');
                document.getElementById('stopAllBtn').classList.add('inline-flex');
            };

            currentUtterance.onend = () => {
                resetUI();
            };
            
            currentUtterance.onerror = () => {
                resetUI();
            };

            synth.speak(currentUtterance);
        }

        function stopSpeech() {
            synth.cancel();
            resetUI();
        }

        function updateUIPplaying(index) {
            // Reset all buttons first
            document.querySelectorAll('.btn-play').forEach(btn => {
                btn.classList.remove('btn-playing');
                btn.querySelector('.btn-text').textContent = 'Escuchar';
                btn.querySelector('svg').innerHTML = '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>';
            });

            // Set active button
            const activeBtn = document.getElementById(`btn-${index}`);
            if (activeBtn) {
                activeBtn.classList.add('btn-playing');
                activeBtn.querySelector('.btn-text').textContent = 'Pausar';
                // Pause icon
                activeBtn.querySelector('svg').innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>';
            }
        }

        function resetUI() {
            activeIndex = -1;
            document.getElementById('stopAllBtn').classList.add('hidden');
            document.getElementById('stopAllBtn').classList.remove('inline-flex');
            
            document.querySelectorAll('.btn-play').forEach(btn => {
                btn.classList.remove('btn-playing');
                btn.querySelector('.btn-text').textContent = 'Escuchar';
                // Play icon
                btn.querySelector('svg').innerHTML = '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>';
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
            
            // Load voices ahead of time (fix for some browsers)
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => synth.getVoices();
            }
            
            // Stop speech if user closes window or navigates away
            window.addEventListener('beforeunload', () => {
                synth.cancel();
            });
        });
    </script>
</body>
</html>
