            if (isPresenter) {
                roleBadge.textContent = "💻 Mando del Presentador";
                roleBadge.className = "text-sm font-bold tracking-wide uppercase px-4 py-1.5 rounded-full bg-blue-100 text-blue-800 border border-blue-200 shadow-sm";
                pingDot.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75";
                solidDot.className = "relative inline-flex rounded-full h-3 w-3 bg-blue-600";
                
                controls.classList.remove('hidden');
                keyboardHint.classList.remove('hidden');
            } else {
                roleBadge.textContent = "📱 Espectador Sincronizado";
                roleBadge.className = "text-sm font-bold tracking-wide uppercase px-4 py-1.5 rounded-full bg-green-100 text-green-800 border border-green-200 shadow-sm";
                pingDot.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75";
                solidDot.className = "relative inline-flex rounded-full h-3 w-3 bg-green-500";
                
                // Aseguramos que los controles no existan para el espectador
                controls.classList.add('hidden');
                keyboardHint.classList.add('hidden');
            }
        }

        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
                authStatus.textContent = "Error de conexión. Recarga la página.";
            }
        };

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                applyRoleUI();
                startApp();
            }
        });

        initAuth();

        // Funciones exclusivas del presentador
        window.nextSlide = () => {
            if (isPresenter && currentSlide < slides.length - 1) {
                currentSlide++;
                updateGlobalSlide(currentSlide);
                renderSlide(); // Actualiza su propia pantalla instantáneamente
            }
        };

        window.prevSlide = () => {
            if (isPresenter && currentSlide > 0) {
                currentSlide--;
                updateGlobalSlide(currentSlide);
                renderSlide();
            }
        };

        // Eventos de teclado (Solo funcionan si es el presentador)
        document.addEventListener('keydown', (e) => {
            if (!isPresenter) return;
            if (e.key === 'ArrowRight' || e.key === 'Space') {
                window.nextSlide();
            } else if (e.key === 'ArrowLeft') {
                window.prevSlide();
            }
        });

        function startApp() {
            loadingScreen.classList.add('hidden');
            presentationContainer.classList.remove('hidden');
            
            if (isPresenter) {
                // El presentador fuerza el inicio en la slide 0
                updateGlobalSlide(0);
                renderSlide();
            } else {
                // El espectador empieza a escuchar los cambios en la Base de Datos
                unsubscribeSnapshot = onSnapshot(stateDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.slideIndex !== undefined) {
                            currentSlide = data.slideIndex;
                            renderSlide();
                        }
                    }
                }, (error) => {
                    console.error("Error en sincronización:", error);
                });
            }
        }

        async function updateGlobalSlide(index) {
            if (!currentUser || !isPresenter) return;
            try {
                await setDoc(stateDocRef, { 
                    slideIndex: index,
                    timestamp: new Date().getTime() 
                }, { merge: true });
            } catch (error) {
                console.error("Error actualizando DB:", error);
            }
        }

        function renderSlide() {
            slideContent.classList.remove('slide-enter');
            void slideContent.offsetWidth; // Trigger reflow para reiniciar animación
            slideContent.classList.add('slide-enter');

            const slideData = slides[currentSlide];
            
            // Si es presentador le inyectamos las notas al final del HTML
            if (isPresenter) {
                slideContent.innerHTML = slideData.html + 
                    `<div class="notes-panel">
                        <strong>🎙️ Tu Guion (Solo tú ves esto):</strong><br>
                        ${slideData.nota}
                    </div>`;
            } else {
                // El espectador solo ve el HTML puro
                slideContent.innerHTML = slideData.html;
            }
            
            slideCounter.textContent = currentSlide + 1;

            if (isPresenter) {
                btnPrev.disabled = currentSlide === 0;
                btnNext.disabled = currentSlide === slides.length - 1;
            }
        }
    </script>
</body>
</html>
