        let currentSlide = 0;
        let currentUser = null;
        let unsubscribe = null;
        const loadingScreen = document.getElementById('loading-screen');
        const presentationContainer = document.getElementById('presentation-container');
        const slideContent = document.getElementById('slide-content');
        const slideCounter = document.getElementById('slide-counter');
        const roleBadge = document.getElementById('role-badge');
        const controls = document.getElementById('controls');

        function applyUI() {
            roleBadge.textContent = isPresenter ? "💻 Presentador" : "📱 Espectador";
            roleBadge.className = isPresenter ? "text-xs font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-800 border border-blue-200 shadow-sm" : "text-xs font-bold px-3 py-1 rounded-full bg-green-100 text-green-800 border border-green-200 shadow-sm";
            if (isPresenter) controls.classList.remove('hidden');
        }

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, user => {
                    if (user) {
                        currentUser = user;
                        applyUI();
                        loadingScreen.classList.add('hidden');
                        presentationContainer.classList.remove('hidden');
                        if (isPresenter) { updateDB(0); render(); }
                        else { onSnapshot(stateDocRef, s => { if (s.exists()) { currentSlide = s.data().slideIndex; render(); } }); }
                    }
                });
            } catch (e) { console.error(e); }
        }

        window.nextSlide = () => { if (currentSlide < slides.length - 1) { currentSlide++; if (isPresenter) updateDB(currentSlide); render(); } };
        window.prevSlide = () => { if (currentSlide > 0) { currentSlide--; if (isPresenter) updateDB(currentSlide); render(); } };

        async function updateDB(i) { await setDoc(stateDocRef, { slideIndex: i, time: Date.now() }, { merge: true }); }

        function render() {
            slideContent.classList.remove('slide-enter');
            void slideContent.offsetWidth;
            slideContent.classList.add('slide-enter');
            
            const data = slides[currentSlide];
            slideContent.innerHTML = isPresenter ? data.html + `<div class="notes-panel"><strong>🎙 Notas (Solo tú ves esto):</strong><br>${data.nota}</div>` : data.html;
            
            // Generar el QR localmente y al instante si estamos en la diapositiva 1
            if (currentSlide === 0) {
                const qrContainer = document.getElementById("qrcode");
                if (qrContainer) {
                    qrContainer.innerHTML = ""; // Limpia el contenedor por si acaso
                    new QRCode(qrContainer, {
                        text: baseUrl,
                        width: 120,
                        height: 120,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                }
            }

            slideCounter.textContent = currentSlide + 1;
            document.getElementById('btn-prev').disabled = currentSlide === 0;
            document.getElementById('btn-next').disabled = currentSlide === slides.length - 1;
        }

        document.addEventListener('keydown', e => { if (isPresenter) { if (e.key === 'ArrowRight' || e.key === ' ') nextSlide(); if (e.key === 'ArrowLeft') prevSlide(); } });
        init();
    </script>
